<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Telegram Broadcast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0e1520;
    --surface2: #152030;
    --border: #1e3040;
    --accent: #00d4ff;
    --accent2: #0090cc;
    --green: #00ff88;
    --red: #ff4466;
    --yellow: #ffcc00;
    --text: #c8dde8;
    --muted: #4a6070;
    --radius: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px; }
  #root { min-height: 100vh; display: flex; flex-direction: column; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 28px; border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }
  .header-logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
  .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: var(--accent); letter-spacing: -0.5px; }
  .logo-sub { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
  .header-user { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }

  .nav { display: flex; gap: 2px; padding: 12px 28px; border-bottom: 1px solid var(--border); background: var(--bg); }
  .nav-btn {
    padding: 6px 16px; border-radius: var(--radius); cursor: pointer; border: none;
    background: transparent; color: var(--muted); font-family: inherit; font-size: 12px;
    letter-spacing: 1px; text-transform: uppercase; transition: all .2s;
  }
  .nav-btn:hover { color: var(--text); background: var(--surface); }
  .nav-btn.active { color: var(--accent); background: var(--surface); border-bottom: 2px solid var(--accent); }

  .main { flex: 1; display: flex; gap: 0; overflow: hidden; }
  .page { flex: 1; padding: 28px; overflow-y: auto; }

  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px; margin-bottom: 16px;
  }
  .card-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; color: var(--accent); margin-bottom: 16px; letter-spacing: 0.5px; text-transform: uppercase; }

  label { display: block; font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; margin-top: 14px; }
  label:first-of-type { margin-top: 0; }
  input[type="text"], input[type="tel"], input[type="number"], input[type="password"], textarea {
    width: 100%; padding: 10px 12px; border-radius: var(--radius);
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    font-family: inherit; font-size: 13px; outline: none; transition: border-color .2s;
  }
  input:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 100px; }

  .btn {
    display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px;
    border-radius: var(--radius); border: none; cursor: pointer; font-family: inherit;
    font-size: 12px; font-weight: 500; letter-spacing: 0.5px; transition: all .2s;
  }
  .btn-primary { background: var(--accent); color: var(--bg); }
  .btn-primary:hover { background: #00b8e0; transform: translateY(-1px); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-danger:hover { background: #e0003a; }
  .btn-success { background: var(--green); color: var(--bg); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-sm { padding: 6px 12px; font-size: 11px; }

  .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; }
  .toggle-label { font-size: 12px; color: var(--text); }
  .toggle { position: relative; width: 40px; height: 22px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: var(--border); border-radius: 11px; cursor: pointer; transition: .3s;
  }
  .toggle-slider:before {
    position: absolute; content: ''; height: 16px; width: 16px; left: 3px; bottom: 3px;
    background: var(--muted); border-radius: 50%; transition: .3s;
  }
  input:checked + .toggle-slider { background: var(--accent2); }
  input:checked + .toggle-slider:before { transform: translateX(18px); background: var(--accent); }

  .chat-list { max-height: 460px; overflow-y: auto; }
  .chat-item {
    display: flex; align-items: flex-start; gap: 12px; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 6px;
    cursor: pointer; transition: all .15s; position: relative;
  }
  .chat-item:hover { border-color: var(--accent2); background: var(--surface2); }
  .chat-item.selected { border-color: var(--accent); background: rgba(0,212,255,0.06); }
  .chat-avatar {
    width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: bold; flex-shrink: 0; margin-top: 2px;
  }
  .chat-avatar.group { background: rgba(0,212,255,0.15); color: var(--accent); }
  .chat-avatar.channel { background: rgba(0,144,204,0.15); color: var(--accent2); }
  .chat-info { flex: 1; min-width: 0; }
  .chat-name { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chat-meta { font-size: 11px; color: var(--muted); margin-top: 2px; display: flex; align-items: center; flex-wrap: wrap; gap: 4px; }
  .chat-tags-row { display: flex; align-items: center; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
  .chat-check { width: 18px; height: 18px; border: 2px solid var(--border); border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-top: 2px; }
  .chat-item.selected .chat-check { background: var(--accent); border-color: var(--accent); }
  .chat-edit-btn { opacity: 0; transition: opacity .15s; position: absolute; right: 36px; top: 10px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); border-radius: 4px; padding: 2px 7px; font-size: 10px; cursor: pointer; }
  .chat-item:hover .chat-edit-btn { opacity: 1; }

  .tag-chip { display: inline-flex; align-items: center; gap: 3px; padding: 1px 7px; border-radius: 10px; font-size: 10px; font-weight: 500; cursor: default; }
  .tag-chip.removable { cursor: pointer; }
  .tag-chip.removable:hover { opacity: 0.7; }
  .owner-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 1px 7px; }
  .owner-chip svg { width: 9px; height: 9px; }

  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
  .filter-chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 10px; font-size: 11px; border: 1px solid transparent; cursor: pointer; transition: all .15s; }
  .filter-chip:hover { opacity: 0.8; }
  .filter-chip.active { box-shadow: 0 0 0 1px var(--accent); }
  .filter-chip-owner { background: var(--surface2); border-color: var(--border); color: var(--text); }
  .filter-chip-owner.active { border-color: var(--accent); color: var(--accent); }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 200; display: flex; align-items: center; justify-content: center; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; width: 360px; max-height: 80vh; overflow-y: auto; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--accent); margin-bottom: 16px; }
  .modal-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; display: block; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
  .tag-palette { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .tag-dot { width: 16px; height: 16px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
  .tag-dot.active { border-color: var(--text); }

  .progress-bar { width: 100%; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin: 12px 0; }
  .progress-fill { height: 100%; background: var(--accent); transition: width .3s; }
  .stats-row { display: flex; gap: 16px; margin: 12px 0; }
  .stat { flex: 1; text-align: center; padding: 10px; background: var(--bg); border-radius: var(--radius); border: 1px solid var(--border); }
  .stat-val { font-size: 24px; font-family: 'Syne', sans-serif; font-weight: 800; }
  .stat-key { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
  .val-green { color: var(--green); }
  .val-red { color: var(--red); }
  .val-blue { color: var(--accent); }

  .log-box {
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px; font-size: 12px; line-height: 1.7; max-height: 260px; overflow-y: auto;
    font-family: 'JetBrains Mono', monospace;
  }
  .log-line { padding: 1px 0; }

  .login-wrap { max-width: 440px; margin: 60px auto; padding: 0 20px; }
  .login-hero { text-align: center; margin-bottom: 32px; }
  .login-hero h1 { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; color: var(--accent); }
  .login-hero p { color: var(--muted); margin-top: 8px; font-size: 12px; }

  .alert { padding: 10px 14px; border-radius: var(--radius); font-size: 12px; margin-top: 12px; }
  .alert-err { background: rgba(255,68,102,0.1); border: 1px solid rgba(255,68,102,0.3); color: var(--red); }
  .alert-ok { background: rgba(0,255,136,0.08); border: 1px solid rgba(0,255,136,0.25); color: var(--green); }
  .alert-info { background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.2); color: var(--accent); }

  .sidebar { width: 280px; background: var(--surface); border-left: 1px solid var(--border); padding: 20px; overflow-y: auto; }
  .sidebar-title { font-size: 11px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 12px; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; letter-spacing: 0.5px; }
  .badge-blue { background: rgba(0,212,255,0.15); color: var(--accent); }
  .badge-green { background: rgba(0,255,136,0.12); color: var(--green); }
  .badge-red { background: rgba(255,68,102,0.12); color: var(--red); }

  table { width: 100%; border-collapse: collapse; }
  th { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text); }
  tr:hover td { background: var(--surface2); }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .row-gap { display: flex; gap: 10px; align-items: flex-end; margin-top: 14px; }
  .mt { margin-top: 12px; }
  .sep { height: 1px; background: var(--border); margin: 16px 0; }
  .selected-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .search-row { margin-bottom: 10px; }
  .current-tag { font-size: 11px; color: var(--accent); padding: 3px 8px; border: 1px solid var(--accent2); border-radius: 4px; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }

  .attach-bar {
    display: flex; align-items: center; gap: 10px; margin-top: 10px;
  }
  .attach-preview {
    display: flex; align-items: center; gap: 10px; padding: 8px 10px;
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
    margin-top: 8px; flex-wrap: wrap;
  }
  .attach-preview img {
    max-height: 72px; max-width: 120px; border-radius: 4px;
    border: 1px solid var(--border); object-fit: cover;
  }
  .attach-info { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 0; }
  .attach-name { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .attach-size { font-size: 11px; color: var(--muted); }
  .attach-icon { font-size: 28px; line-height: 1; }

  
.slider-wrap { margin-top: 4px; }
.slider-row { display: flex; align-items: center; gap: 12px; }
.slider-val { min-width: 52px; text-align: right; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; color: var(--accent); }
input[type="range"] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 4px; border-radius: 2px;
  background: var(--border); outline: none; cursor: pointer;
  border: none; padding: 0;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--accent); cursor: pointer;
  box-shadow: 0 0 8px rgba(0,212,255,0.5);
  transition: transform .15s;
}
input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
.risk-box {
  margin-top: 12px; padding: 10px 14px;
  border-radius: var(--radius); font-size: 12px;
  display: flex; align-items: flex-start; gap: 8px;
  transition: all .3s;
}
.risk-safe { background: rgba(0,255,136,0.08); border: 1px solid rgba(0,255,136,0.3); color: var(--green); }
.risk-warn { background: rgba(255,204,0,0.08); border: 1px solid rgba(255,204,0,0.35); color: var(--yellow); }
.risk-danger { background: rgba(255,68,102,0.1); border: 1px solid rgba(255,68,102,0.4); color: var(--red); }
.risk-icon { font-size: 16px; line-height: 1; flex-shrink: 0; margin-top: 1px; }
.risk-text { line-height: 1.5; }
.risk-title { font-weight: 700; letter-spacing: 0.3px; }
.risk-detail { font-size: 11px; margin-top: 2px; opacity: 0.85; }
.slider-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-top: 3px; letter-spacing: 0.5px; }

body::before {
    content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,212,255,0.01) 2px, rgba(0,212,255,0.01) 4px);
    pointer-events: none; z-index: 9999;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const DEFAULT_API_BASE = 'https://web-production-b8b8b.up.railway.app';
function getApiBase() {
  return localStorage.getItem('api_base') || sessionStorage.getItem('api_base') || DEFAULT_API_BASE;
}
let API_BASE = getApiBase();

// ─── App auth (JWT) ──────────────────────────────────────────────────────────
function getAppToken() { return localStorage.getItem('app_token') || ''; }
function setAppToken(t) { localStorage.setItem('app_token', t); }
function clearAppToken() { localStorage.removeItem('app_token'); }
function getAppUser() {
  try { return JSON.parse(localStorage.getItem('app_user') || 'null'); } catch { return null; }
}
function setAppUserData(u) { localStorage.setItem('app_user', JSON.stringify(u)); }
function clearAppUserData() { localStorage.removeItem('app_user'); }

function getSessionToken() { return localStorage.getItem('tgb_session_token') || sessionStorage.getItem('session_token') || ''; }
function setSessionToken(t) { localStorage.setItem('tgb_session_token', t); sessionStorage.setItem('session_token', t); }
function clearSessionToken() { localStorage.removeItem('tgb_session_token'); localStorage.removeItem('tgb_tg_creds'); sessionStorage.removeItem('session_token'); }
function getTgCreds() { try { return JSON.parse(localStorage.getItem('tgb_tg_creds') || 'null'); } catch { return null; } }
function setTgCreds(apiId, apiHash) { localStorage.setItem('tgb_tg_creds', JSON.stringify({ apiId, apiHash })); }
function sqt() { const t = getSessionToken(); return t ? '?session_token=' + encodeURIComponent(t) : '?'; }
function allHeaders(extra = {}) {
  const h = { ...extra };
  const tg = getSessionToken();
  const jwt = getAppToken();
  if (tg) h['X-Session-Token'] = tg;
  if (jwt) h['Authorization'] = 'Bearer ' + jwt;
  return h;
}
const api = {
  get:    (path) => fetch(API_BASE + path, { headers: allHeaders() }).then(r => { if(!r.ok) return r.json().then(e => { throw new Error(e.detail || r.status); }); return r.json(); }),
  post:   (path, body) => fetch(API_BASE + path, { method:'POST', headers: allHeaders({'Content-Type':'application/json'}), body: JSON.stringify(body) }).then(r => { if(!r.ok) return r.json().then(e => { throw new Error(e.detail || r.status); }); return r.json(); }),
  upload: (path, fd) => fetch(API_BASE + path, { method:'POST', headers: allHeaders(), body: fd }).then(r => { if(!r.ok) return r.json().then(e => { throw new Error(e.detail || r.status); }); return r.json(); }),
  del:    (path) => fetch(API_BASE + path, { method:'DELETE', headers: allHeaders() }).then(r => r.json()),
  put:    (path, body) => fetch(API_BASE + path, { method:'PUT', headers: allHeaders({'Content-Type':'application/json'}), body: JSON.stringify(body) }).then(r => { if(!r.ok) return r.json().then(e => { throw new Error(e.detail || r.status); }); return r.json(); }),
};

// ─── SettingsScreen ──────────────────────────────────────────────────────────
function SettingsScreen({ onSave }) {
  const [url, setUrl] = useState(API_BASE);
  const [testing, setTesting] = useState(false);
  const [err, setErr] = useState('');
  const [ok, setOk] = useState(false);

  const test = async () => {
    setTesting(true); setErr(''); setOk(false);
    try {
      const r = await fetch(url.replace(/\/$/, '') + '/health');
      if (r.ok) setOk(true);
      else setErr('Server error: ' + r.status);
    } catch(e) { setErr('Cannot connect. Check the URL.'); }
    setTesting(false);
  };

  const save = () => {
    const clean = url.replace(/\/$/, '');
    localStorage.setItem('api_base', clean); sessionStorage.setItem('api_base', clean);
    API_BASE = clean;
    onSave();
  };

  return (
    <div className="login-wrap">
      <div className="login-hero">
        <h1>Telegram Broadcast</h1>
        <p>Connect to your backend to get started</p>
      </div>
      <div className="card">
        <div className="card-title">Backend Address</div>
        <p style={{fontSize:'12px',color:'var(--muted)',marginBottom:12}}>
          Copy the URL from Railway (Settings &gt; Domains) and paste it here.
          Example: <span style={{color:'var(--accent)'}}>https://xxx.railway.app</span>
        </p>
        <label>Backend URL</label>
        <input type="text" placeholder="https://your-app.railway.app" value={url} onChange={e=>setUrl(e.target.value)} />
        {err && <div className="alert alert-err" style={{marginTop:8}}>{err}</div>}
        {ok && <div className="alert alert-ok" style={{marginTop:8}}>Server is reachable!</div>}
        <div className="row-gap" style={{marginTop:14}}>
          <button className="btn btn-secondary" onClick={test} disabled={testing || !url}>
            {testing ? <><span className="spinner"/> Checking...</> : 'Test'}
          </button>
          <button className="btn btn-primary" onClick={save} disabled={!url}>Save</button>
        </div>
      </div>
    </div>
  );
}

// ─── AppLoginScreen ──────────────────────────────────────────────────────────
function AppLoginScreen({ onLogin }) {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');

  const doLogin = async () => {
    setLoading(true); setErr('');
    try {
      const r = await fetch(API_BASE + '/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      if (!r.ok) { const e = await r.json(); throw new Error(e.detail || 'Login failed'); }
      const data = await r.json();
      setAppToken(data.token);
      setAppUserData({ id: data.id, username: data.username, role: data.role });
      onLogin({ id: data.id, username: data.username, role: data.role });
    } catch(e) { setErr(e.message); }
    setLoading(false);
  };

  return (
    <div className="login-wrap">
      <div className="login-hero">
        <h1>Telegram Broadcast</h1>
        <p>Evoplay User Client</p>
      </div>
      <div className="card">
        <div className="card-title">Sign In</div>
        <label>Username</label>
        <input type="text" placeholder="admin" value={username}
          onChange={e=>setUsername(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&doLogin()} />
        <label>Password</label>
        <input type="password" placeholder="••••••••" value={password}
          onChange={e=>setPassword(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&doLogin()} />
        {err && <div className="alert alert-err" style={{marginTop:8}}>{err}</div>}
        <div style={{marginTop:16}}>
          <button className="btn btn-primary" style={{width:'100%'}}

}

  const [err, setErr] = useState('');

    setLoading(false);
  };

// ─── Tag colors palette ────────────────────────────────────────────────────
const TAG_COLORS = [
  '#00d4ff','#00ff88','#ff4466','#ffcc00','#a78bfa','#fb923c',
  '#34d399','#f472b6','#60a5fa','#e879f9',
];

// ─── Chat meta storage (localStorage-backed) ───────────────────────────────
const LS_META = 'tgb_chat_meta';
const LS_TAGS = 'tgb_global_tags';
const LS_SEQ  = 'tgb_tag_seq';

function _loadLS(key, def) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; }
}
function _saveLS(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

const chatMeta    = _loadLS(LS_META, {});
const globalTags  = _loadLS(LS_TAGS, {});
let _tagSeq = _loadLS(LS_SEQ, 1);

function mkTagId() {
  const id = 'tag_' + _tagSeq++;
  _saveLS(LS_SEQ, _tagSeq);
  return id;
}
function getChatMeta(id) {
  if (!chatMeta[id]) chatMeta[id] = { tags: [], owner: '' };
  return chatMeta[id];
}
function saveChatMeta(id, data) {
  chatMeta[id] = data;
  _saveLS(LS_META, chatMeta);
}
function saveGlobalTag(t) {
  globalTags[t.id] = t;
  _saveLS(LS_TAGS, globalTags);
}
function deleteGlobalTag(tId) {
  delete globalTags[tId];
  // remove from all chat metas
  for (const id of Object.keys(chatMeta)) {
    chatMeta[id].tags = (chatMeta[id].tags || []).filter(t => t.id !== tId);
  }
  _saveLS(LS_TAGS, globalTags);
  _saveLS(LS_META, chatMeta);
}
function getAllOwners() {
  return [...new Set(Object.values(chatMeta).map(m => m.owner).filter(Boolean))].sort();
}

// ─── EditChatModal ─────────────────────────────────────────────────────────
function EditChatModal({ chat, onClose, onSave }) {
  const meta = getChatMeta(chat.id);
  const [tags, setTags] = useState([...meta.tags]);
  const [owner, setOwner] = useState(meta.owner || '');
  const [newTagName, setNewTagName] = useState('');
  const [newTagColor, setNewTagColor] = useState(TAG_COLORS[0]);
  const [ownerOpen, setOwnerOpen] = useState(false);

  const allGlobalTags = Object.values(globalTags);
  const knownOwners = getAllOwners();
  const hasTag = (tId) => tags.some(t => t.id === tId);

  const addExistingTag = (t) => {
    if (!hasTag(t.id)) setTags(prev => [...prev, t]);
  };
  const removeTag = (tId) => setTags(prev => prev.filter(t => t.id !== tId));

  const createTag = () => {
    const name = newTagName.trim();
    if (!name) return;
    // check duplicate name
    const existing = allGlobalTags.find(t => t.name.toLowerCase() === name.toLowerCase());
    if (existing) { addExistingTag(existing); setNewTagName(''); return; }
    const id = mkTagId();
    const t = { id, name, color: newTagColor };
    saveGlobalTag(t);
    setTags(prev => [...prev, t]);
    setNewTagName('');
    setNewTagColor(TAG_COLORS[_tagSeq % TAG_COLORS.length]);
  };

  const handleSave = () => {
    saveChatMeta(chat.id, { tags, owner: owner.trim() });
    onSave();
    onClose();
  };

  const ownerSuggestions = knownOwners.filter(o =>
    o.toLowerCase().includes(owner.toLowerCase()) && o !== owner
  );

  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-title">Edit Chat</div>
        <div style={{fontSize:13,color:'var(--text)',marginBottom:16,fontWeight:500}}>{chat.name}</div>

        <span className="modal-label">Owner</span>
        <div style={{position:'relative',marginBottom:16}}>
          <input
            type="text" placeholder="e.g. Anton" value={owner}
            onChange={e=>{setOwner(e.target.value);setOwnerOpen(true);}}
            onFocus={()=>setOwnerOpen(true)}
            onBlur={()=>setTimeout(()=>setOwnerOpen(false),150)}
          />
          {ownerOpen && ownerSuggestions.length > 0 && (
            <div style={{position:'absolute',top:'100%',left:0,right:0,background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,zIndex:999,maxHeight:140,overflowY:'auto'}}>
              {ownerSuggestions.map(o => (
                <div key={o} onMouseDown={()=>{setOwner(o);setOwnerOpen(false);}}
                  style={{padding:'7px 12px',cursor:'pointer',fontSize:13,color:'var(--text)'}}
                  onMouseEnter={e=>e.target.style.background='var(--hover)'}
                  onMouseLeave={e=>e.target.style.background='transparent'}>
                  {o}
                </div>
              ))}
            </div>
          )}
        </div>

        <span className="modal-label">Tags on this chat</span>
        <div className="tag-palette" style={{marginBottom:8}}>
          {tags.length === 0 && <span style={{fontSize:11,color:'var(--muted)'}}>No tags yet</span>}
          {tags.map(t => (
            <span key={t.id} className="tag-chip removable"
              style={{background: t.color+'22', color: t.color, border:`1px solid ${t.color}55`}}
              onClick={() => removeTag(t.id)}
              title="Click to remove">
              {t.name} &times;
            </span>
          ))}
        </div>

        {allGlobalTags.filter(t => !hasTag(t.id)).length > 0 && (
          <>
            <span className="modal-label">Add existing tag</span>
            <div className="tag-palette" style={{marginBottom:12}}>
              {allGlobalTags.filter(t => !hasTag(t.id)).map(t => (
                <span key={t.id} className="tag-chip removable"
                  style={{background: t.color+'22', color: t.color, border:`1px solid ${t.color}55`}}
                  onClick={() => addExistingTag(t)}>
                  + {t.name}
                </span>
              ))}
            </div>
          </>
        )}

        <span className="modal-label">Create new tag</span>
        <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:6}}>
          <input type="text" placeholder="Tag name" value={newTagName}
            onChange={e=>setNewTagName(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&createTag()}
            style={{flex:1}} />
          <button className="btn btn-secondary btn-sm" onClick={createTag} disabled={!newTagName.trim()}>+ Add</button>
        </div>
        <div style={{display:'flex',gap:6,marginBottom:4}}>
          {TAG_COLORS.map(c => (
            <div key={c} className={`tag-dot ${newTagColor===c?'active':''}`}
              style={{background:c}} onClick={()=>setNewTagColor(c)}/>
          ))}
        </div>

        <div className="modal-footer">
          <button className="btn btn-secondary btn-sm" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary btn-sm" onClick={handleSave}>Save</button>
        </div>
      </div>
    </div>
  );
}

// ─── BulkAssignPanel ────────────────────────────────────────────────────────
function BulkAssignPanel({ selectedIds, onApplied }) {
  const [owner, setOwner] = useState('');
  const [ownerOpen, setOwnerOpen] = useState(false);
  const [selectedTags, setSelectedTags] = useState([]); // [{id,name,color}]
  const [newTagName, setNewTagName] = useState('');
  const [newTagColor, setNewTagColor] = useState(TAG_COLORS[0]);
  const [mode, setMode] = useState('add'); // 'add' | 'replace'
  const [done, setDone] = useState('');
  const [, forceUpdate] = useState(0);

  const allGlobalTags = Object.values(globalTags);
  const knownOwners = getAllOwners();
  const hasTag = (tId) => selectedTags.some(t => t.id === tId);

  const toggleTag = (t) => {
    setSelectedTags(prev => prev.some(x => x.id === t.id)
      ? prev.filter(x => x.id !== t.id)
      : [...prev, t]);
  };

  const createAndAddTag = () => {
    const name = newTagName.trim();
    if (!name) return;
    const existing = allGlobalTags.find(t => t.name.toLowerCase() === name.toLowerCase());
    if (existing) { if (!hasTag(existing.id)) setSelectedTags(prev => [...prev, existing]); setNewTagName(''); return; }
    const id = mkTagId();
    const t = { id, name, color: newTagColor };
    saveGlobalTag(t);
    setSelectedTags(prev => [...prev, t]);
    setNewTagName('');
    setNewTagColor(TAG_COLORS[_tagSeq % TAG_COLORS.length]);
    forceUpdate(n => n+1);
  };

  const apply = () => {
    if (!owner.trim() && selectedTags.length === 0) return;
    let count = 0;
    for (const id of selectedIds) {
      const meta = getChatMeta(id);
      const newMeta = { ...meta };
      if (owner.trim()) newMeta.owner = owner.trim();
      if (selectedTags.length > 0) {
        if (mode === 'replace') {
          newMeta.tags = [...selectedTags];
        } else {
          // merge — add tags not already present
          const existing = new Set(meta.tags.map(t => t.id));
          newMeta.tags = [...meta.tags, ...selectedTags.filter(t => !existing.has(t.id))];
        }
      }
      saveChatMeta(id, newMeta);
      count++;
    }
    setDone(`Applied to ${count} chats`);
    setTimeout(() => setDone(''), 2500);
    onApplied && onApplied();
  };

  const ownerSuggestions = knownOwners.filter(o =>
    o.toLowerCase().includes(owner.toLowerCase()) && o !== owner
  );

  const canApply = owner.trim() || selectedTags.length > 0;

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
        <label style={{marginBottom:0}}>
          Bulk assign to <span style={{color:'var(--accent)',fontWeight:700}}>{selectedIds.length}</span> selected chats
        </label>
      </div>

      {/* Owner */}
      <div style={{marginBottom:12}}>
        <span className="modal-label">Owner</span>
        <div style={{position:'relative'}}>
          <input type="text" placeholder="Set owner (leave blank to skip)"
            value={owner}
            onChange={e=>{setOwner(e.target.value);setOwnerOpen(true);}}
            onFocus={()=>setOwnerOpen(true)}
            onBlur={()=>setTimeout(()=>setOwnerOpen(false),150)}
          />
          {ownerOpen && ownerSuggestions.length > 0 && (
            <div style={{position:'absolute',top:'100%',left:0,right:0,background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,zIndex:999,maxHeight:120,overflowY:'auto'}}>
              {ownerSuggestions.map(o => (
                <div key={o} onMouseDown={()=>{setOwner(o);setOwnerOpen(false);}}
                  style={{padding:'7px 12px',cursor:'pointer',fontSize:13,color:'var(--text)'}}
                  onMouseEnter={e=>e.currentTarget.style.background='var(--hover)'}
                  onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  {o}
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* Tags */}
      <div style={{marginBottom:8}}>
        <span className="modal-label">Tags</span>

        {/* existing global tags as toggles */}
        {allGlobalTags.length > 0 && (
          <div className="tag-palette" style={{marginBottom:8}}>
            {allGlobalTags.map(t => (
              <span key={t.id}
                className="tag-chip removable"
                style={{
                  background: hasTag(t.id) ? t.color+'44' : t.color+'18',
                  color: t.color,
                  border: `1px solid ${hasTag(t.id) ? t.color : t.color+'44'}`,
                  opacity: hasTag(t.id) ? 1 : 0.6,
                  fontWeight: hasTag(t.id) ? 700 : 400,
                }}
                onClick={() => toggleTag(t)}>
                {hasTag(t.id) ? '✓ ' : '+ '}{t.name}
              </span>
            ))}
          </div>
        )}

        {/* create new tag inline */}
        <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:6}}>
          <input type="text" placeholder="New tag name" value={newTagName}
            onChange={e=>setNewTagName(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&createAndAddTag()}
            style={{flex:1}} />
          <button className="btn btn-secondary btn-sm" onClick={createAndAddTag} disabled={!newTagName.trim()}>+ Add</button>
        </div>
        <div style={{display:'flex',gap:6,marginBottom:8}}>
          {TAG_COLORS.map(c => (
            <div key={c} className={`tag-dot ${newTagColor===c?'active':''}`}
              style={{background:c}} onClick={()=>setNewTagColor(c)}/>
          ))}
        </div>

        {/* merge mode */}
        {selectedTags.length > 0 && (
          <div style={{display:'flex',gap:8,marginBottom:6}}>
            {['add','replace'].map(m => (
              <label key={m} style={{display:'flex',alignItems:'center',gap:5,fontSize:12,cursor:'pointer',color: mode===m ? 'var(--accent)' : 'var(--muted)'}}>
                <input type="radio" checked={mode===m} onChange={()=>setMode(m)} style={{accentColor:'var(--accent)'}} />
                {m === 'add' ? 'Add to existing tags' : 'Replace all tags'}
              </label>
            ))}
          </div>
        )}
      </div>

      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <button className="btn btn-primary btn-sm" onClick={apply} disabled={!canApply}>
          Apply to {selectedIds.length} chats
        </button>
        {done && <span style={{fontSize:12,color:'var(--ok)'}}>{done}</span>}
      </div>
    </div>
  );
}

// ─── TagManagerPanel ────────────────────────────────────────────────────────
function TagManagerPanel({ onChanged }) {
  const [open, setOpen] = useState(false);
  const [, forceUpdate] = useState(0);
  const tags = Object.values(globalTags);

  const doDelete = (tId) => {
    if (!window.confirm('Delete this tag from all chats?')) return;
    deleteGlobalTag(tId);
    forceUpdate(n => n+1);
    onChanged && onChanged();
  };

  if (tags.length === 0 && !open) return null;

  return (
    <div className="card" style={{marginBottom:0}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}}
        onClick={()=>setOpen(o=>!o)}>
        <div className="card-title" style={{marginBottom:0}}>
          Manage Tags
          <span style={{marginLeft:8,fontSize:11,color:'var(--muted)',fontWeight:400}}>{tags.length} tag{tags.length!==1?'s':''}</span>
        </div>
        <span style={{color:'var(--muted)',fontSize:12}}>{open ? '▲' : '▼'}</span>
      </div>
      {open && (
        <div style={{marginTop:12}}>
          {tags.length === 0 && <div style={{fontSize:12,color:'var(--muted)'}}>No tags created yet. Use "Edit" on any chat to create tags.</div>}
          <div className="tag-palette">
            {tags.map(t => (
              <span key={t.id} style={{display:'inline-flex',alignItems:'center',gap:5,
                background:t.color+'22',color:t.color,border:`1px solid ${t.color}55`,
                borderRadius:10,padding:'3px 10px',fontSize:12,fontWeight:500}}>
                {t.name}
                <span onClick={()=>doDelete(t.id)}
                  style={{cursor:'pointer',opacity:0.6,fontSize:13,lineHeight:1,marginLeft:2}}
                  title="Delete tag">&times;</span>
              </span>
            ))}

      )}

  );
}

// ─── ChatsPage ─────────────────────────────────────────────────────────────
function ChatsPage({ selected, setSelected, appUser }) {
  const [chats, setChats] = useState([]);
  const [loading, setLoading] = useState(false);
  const [search, setSearch] = useState('');
  const [lists, setLists] = useState([]);
  const [saveListName, setSaveListName] = useState('');
  const [err, setErr] = useState('');
  const [msg, setMsg] = useState('');
  const [editChat, setEditChat] = useState(null);
  const [, forceUpdate] = useState(0);

  // filter state
  const [filterTags, setFilterTags] = useState([]); // tag ids
  const [filterOwner, setFilterOwner] = useState(''); // owner string

  // admin: session picker
  const isAdmin = appUser?.role === 'admin';
  const [sessions, setSessions] = useState([]);
  const [pickedSession, setPickedSession] = useState('');

  useEffect(() => {
    loadLists();
    if (isAdmin) loadSessions();
  }, []);

  const loadSessions = async () => {
    try {
      const r = await api.get('/api/admin/sessions');
      setSessions(r.sessions || []);
    } catch {}
  };

  const loadChats = async () => {
    setLoading(true); setErr('');
    try {
      const tok = pickedSession || getSessionToken();
      const r = await api.get('/api/chats?session_token=' + encodeURIComponent(tok));
      setChats(r.chats);
    }
    catch(e) { setErr('Failed to load chats: ' + e.message); }
    setLoading(false);
  };

  const loadLists = async () => {
    const r = await api.get('/api/lists' + sqt());
    setLists(r.lists || []);
  };

  const toggle = (id) => {
    setSelected(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev, id]);
  };

  // Build list of all owners used so far
  const allOwners = [...new Set([...getAllOwners(), ...chats.map(c => getChatMeta(c.id).owner).filter(Boolean)])].sort();
  const allTagsInUse = Object.values(globalTags);

  const toggleFilterTag = (tId) => {
    setFilterTags(prev => prev.includes(tId) ? prev.filter(x=>x!==tId) : [...prev, tId]);
  };
  const toggleFilterOwner = (o) => {
    setFilterOwner(prev => prev === o ? '' : o);
  };

  const CHATS_PER_PAGE = 100;
  const [visibleCount, setVisibleCount] = useState(CHATS_PER_PAGE);

  const filtered = chats.filter(c => {
    const meta = getChatMeta(c.id);
    if (search && !c.name.toLowerCase().includes(search.toLowerCase())) return false;
    if (filterOwner && meta.owner !== filterOwner) return false;
    if (filterTags.length > 0 && !filterTags.every(tId => meta.tags.some(t => t.id === tId))) return false;
    return true;
  });

  // Reset pagination when filter changes
  useEffect(() => { setVisibleCount(CHATS_PER_PAGE); }, [search, filterOwner, filterTags.length]);

  const visibleChats = filtered.slice(0, visibleCount);
  const hasMore = filtered.length > visibleCount;

  const selectAll = () => setSelected(filtered.map(c=>c.id));
  const clearAll = () => setSelected([]);

  const doSaveList = async () => {
    if (!saveListName || !selected.length) return;
    await api.post('/api/lists' + sqt(), { name: saveListName, chat_ids: selected });
    setSaveListName(''); setMsg('List saved!'); loadLists();
    setTimeout(() => setMsg(''), 2500);
  };

  const deleteList = async (id) => {
    await api.del('/api/lists/' + id + sqt().replace('?','&')); loadLists();
  };

  const hasFilters = filterTags.length > 0 || filterOwner;

  return (
    <div className="main">
      <div className="page">
        <div className="card">
          <div className="card-title">Load Chats</div>
          {isAdmin && sessions.length > 0 && (
            <div style={{marginBottom:10}}>
              <label style={{fontSize:11,color:'var(--muted)',marginBottom:4,display:'block'}}>Load chats from session:</label>
              <select value={pickedSession} onChange={e=>setPickedSession(e.target.value)}
                style={{background:'var(--surface2)',color:'var(--text)',border:'1px solid var(--border)',borderRadius:6,padding:'6px 10px',width:'100%',fontSize:13}}>
                <option value="">— My session —</option>
                {sessions.map(s => (
                  <option key={s.token} value={s.token}>{s.label}</option>
                ))}
              </select>
            </div>
          )}
          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            <button className="btn btn-primary" onClick={loadChats} disabled={loading}>
              {loading ? <><span className="spinner"/> Loading...</> : 'Load Chats'}
            </button>
            {isAdmin && <button className="btn btn-secondary btn-sm" onClick={loadSessions} title="Refresh sessions list">↻</button>}
            {chats.length > 0 && <span style={{color:'var(--muted)',alignSelf:'center',fontSize:12}}>{chats.length} chats found</span>}
          </div>
          {err && <div className="alert alert-err" style={{marginTop:10}}>{err}</div>}
        </div>

        <TagManagerPanel onChanged={() => forceUpdate(n => n+1)} />

        {chats.length > 0 && (
          <div className="card">
            <div className="selected-bar">
              <div className="card-title" style={{marginBottom:0}}>
                Select Chats <span className="badge badge-blue" style={{marginLeft:8}}>{selected.length} selected</span>
              </div>
              <div style={{display:'flex',gap:8}}>
                <button className="btn btn-secondary btn-sm" onClick={selectAll}>Select All</button>
                <button className="btn btn-secondary btn-sm" onClick={clearAll}>Clear</button>
              </div>
            </div>

            {/* Filter bar */}
            {(allTagsInUse.length > 0 || allOwners.length > 0) && (
              <div style={{marginBottom:10}}>
                {allTagsInUse.length > 0 && (
                  <div className="filter-bar" style={{marginBottom:6}}>
                    <span style={{fontSize:10,color:'var(--muted)',letterSpacing:'1px',textTransform:'uppercase'}}>Tags:</span>
                    {allTagsInUse.map(t => (
                      <span key={t.id}
                        className={`filter-chip ${filterTags.includes(t.id)?'active':''}`}
                        style={{background:t.color+'22',color:t.color,border:`1px solid ${filterTags.includes(t.id)?t.color:t.color+'44'}`}}
                        onClick={()=>toggleFilterTag(t.id)}>
                        {t.name}
                      </span>
                    ))}
                  </div>
                )}
                {allOwners.length > 0 && (
                  <div className="filter-bar">
                    <span style={{fontSize:10,color:'var(--muted)',letterSpacing:'1px',textTransform:'uppercase'}}>Owner:</span>
                    {allOwners.map(o => (
                      <span key={o}
                        className={`filter-chip filter-chip-owner ${filterOwner===o?'active':''}`}
                        onClick={()=>toggleFilterOwner(o)}>
                        {o}
                      </span>
                    ))}
                  </div>
                )}
                {hasFilters && (
                  <div className="filter-bar">
                    <span className="filter-chip" style={{color:'var(--muted)',border:'1px solid var(--border)'}}
                      onClick={()=>{setFilterTags([]);setFilterOwner('');}}>
                      x Clear filters
                    </span>
                  </div>
                )}
              </div>
            )}

            <div className="search-row">
              <input type="text" placeholder="Search chats..." value={search} onChange={e=>setSearch(e.target.value)} />
            </div>

            <div style={{fontSize:11,color:'var(--muted)',marginBottom:6}}>
              {filtered.length} of {chats.length} chats
              {hasFilters && <span style={{color:'var(--accent)',marginLeft:6}}>(filtered)</span>}
            </div>

            <div className="chat-list">
              {visibleChats.map(c => {
                const meta = getChatMeta(c.id);
                return (
                  <div key={c.id} className={`chat-item ${selected.includes(c.id)?'selected':''}`}
                    onClick={()=>toggle(c.id)}>
                    <div className={`chat-avatar ${c.type}`}>{c.name.charAt(0).toUpperCase()}</div>
                    <div className="chat-info">
                      <div className="chat-name">{c.name}</div>
                      <div className="chat-meta">
                        <span className={`badge badge-${c.type==='channel'?'blue':'green'}`}>{c.type}</span>
                        {c.members && <span>{c.members.toLocaleString()} members</span>}
                        {meta.owner && (
                          <span className="owner-chip">
                            <svg viewBox="0 0 12 12" fill="currentColor"><circle cx="6" cy="4" r="2.5"/><path d="M1 10c0-2.2 2.2-4 5-4s5 1.8 5 4"/></svg>
                            {meta.owner}
                          </span>
                        )}
                      </div>
                      {meta.tags.length > 0 && (
                        <div className="chat-tags-row">
                          {meta.tags.map(t => (
                            <span key={t.id} className="tag-chip"
                              style={{background:t.color+'22',color:t.color,border:`1px solid ${t.color}44`}}>
                              {t.name}
                            </span>
                          ))}
                        </div>
                      )}
                    </div>
                    <button className="chat-edit-btn" onClick={e=>{e.stopPropagation();setEditChat(c);}}>
                      Edit
                    </button>
                    <div className="chat-check">
                      {selected.includes(c.id) && <span style={{color:'var(--bg)',fontSize:12}}>v</span>}
                    </div>
                  </div>
                );
              })}
              {filtered.length === 0 && (
                <div style={{textAlign:'center',padding:'24px 0',color:'var(--muted)',fontSize:12}}>
                  No chats match filters
                </div>
              )}
              {hasMore && (
                <div style={{textAlign:'center',padding:'12px 0'}}>
                  <button className="btn-secondary" onClick={() => setVisibleCount(v => v + CHATS_PER_PAGE)}
                    style={{fontSize:12,padding:'6px 20px'}}>
                    Show more ({filtered.length - visibleCount} remaining)
                  </button>
                </div>
              )}
            </div>

            {selected.length > 0 && (
              <div style={{marginTop:14}}>
                <div className="sep"/>
                <BulkAssignPanel
                  selectedIds={selected}
                  onApplied={() => forceUpdate(n => n+1)}
                />
                <div className="sep" style={{marginTop:12}}/>
                <label>Save selection as list</label>
                <div className="row-gap">
                  <input type="text" placeholder="List name" value={saveListName} onChange={e=>setSaveListName(e.target.value)} style={{flex:1}} />
                  <button className="btn btn-secondary btn-sm" onClick={doSaveList} disabled={!saveListName}>Save</button>
                </div>
                {msg && <div className="alert alert-ok" style={{marginTop:8}}>{msg}</div>}
              </div>
            )}
          </div>
        )}
      </div>

      <div className="sidebar">
        <div className="sidebar-title">Saved Lists</div>
        {lists.length === 0 && <p style={{color:'var(--muted)',fontSize:12}}>No saved lists yet</p>}
        {lists.map(lst => (
          <div key={lst.id} style={{marginBottom:10,padding:'10px',background:'var(--bg)',borderRadius:'var(--radius)',border:'1px solid var(--border)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:13}}>{lst.name}</span>
              <button className="btn btn-secondary btn-sm" style={{padding:'3px 8px',fontSize:10}} onClick={()=>deleteList(lst.id)}>x</button>
            </div>
            <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>{lst.chats.length} chats</div>
            <button className="btn btn-secondary btn-sm" style={{marginTop:8,width:'100%'}} onClick={()=>setSelected(lst.chats)}>Load</button>
          </div>
        ))}
      </div>

      {editChat && (
        <EditChatModal
          chat={editChat}
          onClose={() => setEditChat(null)}
          onSave={() => forceUpdate(n => n+1)}
        />
      )}
    </div>
  );
}

function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function AttachmentPreview({ file, onRemove }) {
  const isImage = file.type.startsWith('image/');
  const [imgUrl, setImgUrl] = React.useState(null);

  useEffect(() => {
    if (isImage) {
      const url = URL.createObjectURL(file);
      setImgUrl(url);
      return () => URL.revokeObjectURL(url);
    }
  }, [file]);

  const fileIcon = () => {
    if (isImage) return null;
    if (file.type === 'application/pdf') return '';
    if (file.type.includes('zip') || file.type.includes('rar')) return '';
    if (file.type.includes('video')) return '';
    if (file.type.includes('audio')) return '';
    return '';
  };

  return (
    <div className="attach-preview">
      {isImage && imgUrl
        ? <img src={imgUrl} alt={file.name} />
        : <span className="attach-icon">{fileIcon()}</span>
      }
      <div className="attach-info">
        <div className="attach-name">{file.name}</div>
        <div className="attach-size">{formatFileSize(file.size)}</div>
      </div>
      <button
        className="btn btn-sm"
        style={{background:'transparent',color:'var(--red)',border:'1px solid rgba(255,68,102,0.3)',flexShrink:0}}
        onClick={onRemove}
      >
        Remove
      </button>
    </div>
  );
}

function BroadcastPage({ selected }) {
  const [message, setMessage] = useState('');
  const [attachment, setAttachment] = useState(null);
  const [delay, setDelay] = useState(5);
  const [randomDelay, setRandomDelay] = useState(false);
  const [maxPerMin, setMaxPerMin] = useState(10);
  const [status, setStatus] = useState(null);
  const [polling, setPolling] = useState(false);
  const [templates, setTemplates] = useState([]);
  const [tplName, setTplName] = useState('');
  const [tplMsg, setTplMsg] = useState('');
  const [tplTab, setTplTab] = useState(false);
  const [confirmOpen, setConfirmOpen] = useState(false);
  const logRef = useRef(null);
  const pollRef = useRef(null);
  const attachRef = useRef(null);

  useEffect(() => { loadTemplates(); }, []);
  useEffect(() => {
    if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
  }, [status?.log]);

  const loadTemplates = async () => {
    const r = await api.get('/api/templates' + sqt()); setTemplates(r.templates || []);
  };

  // Request notification permission once
  useEffect(() => {
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
  }, []);

  const notifyDone = (sent, failed) => {
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification('Broadcast complete ✅', {
        body: `Sent: ${sent}  •  Failed: ${failed}`,
        icon: 'https://classy-boba-c11fe4.netlify.app/favicon.ico',
      });
    }
  };

  const startPoll = () => {
    setPolling(true);
    // Close any existing SSE
    if (pollRef.current) { pollRef.current.close?.(); clearInterval(pollRef.current); }

    const tok = getSessionToken();
    const jwt = getAppToken();
    const url = API_BASE + '/api/broadcast/stream?session_token=' + encodeURIComponent(tok);

    // Try SSE first, fall back to polling if not supported or error
    try {
      // SSE doesn't support custom headers natively — pass JWT as query param
      const sseUrl = url + '&jwt=' + encodeURIComponent(jwt);
      const es = new EventSource(sseUrl);
      pollRef.current = es;
      es.onmessage = (e) => {
        try {
          const s = JSON.parse(e.data);
          setStatus(s);
          if (!s.running && s.finished) {
            es.close();
            setPolling(false);
            notifyDone(s.sent, s.failed);
          }
        } catch {}
      };
      es.onerror = () => {
        // SSE failed — fall back to polling
        es.close();
        fallbackPoll();
      };
    } catch {
      fallbackPoll();
    }
  };

  const fallbackPoll = () => {
    pollRef.current = setInterval(async () => {
      try {
        const s = await api.get('/api/broadcast/status' + sqt());
        setStatus(s);
        if (!s.running && s.finished) {
          clearInterval(pollRef.current);
          setPolling(false);
          notifyDone(s.sent, s.failed);
        }
      } catch {}
    }, 1500);
  };

  const doStart = async () => {
    if (!selected.length || (!message.trim() && !attachment)) return;
    let file_id = null;
    if (attachment) {
      const fd = new FormData();
      fd.append('file', attachment, attachment.name);
      const uploaded = await api.upload('/api/upload' + sqt(), fd);
      file_id = uploaded.file_id ?? uploaded.id ?? uploaded.url ?? null;
    }
    await api.post('/api/broadcast/start' + sqt(), {
      chat_ids: selected,
      message,
      delay,
      random_delay: randomDelay,
      max_per_minute: maxPerMin,
      ...(file_id !== null && { file_id }),
    });
    setConfirmOpen(false);
    startPoll();
  };

  const doStop = async () => {
    await api.post('/api/broadcast/stop' + sqt(), {});
  };

  const doSaveTpl = async () => {
    if (!tplName || !tplMsg) return;
    await api.post('/api/templates' + sqt(), { name: tplName, text: tplMsg });
    setTplName(''); setTplMsg(''); loadTemplates();
  };

  const handleFileChange = (e) => {
    const file = e.target.files[0];
    if (file) setAttachment(file);
    e.target.value = '';
  };

  const removeAttachment = () => {
    setAttachment(null);
    if (attachRef.current) attachRef.current.value = '';
  };

  const canStart = selected.length > 0 && (message.trim().length > 0 || attachment !== null);
  const progress = status ? Math.round((status.sent + status.failed) / (status.total || 1) * 100) : 0;

  return (
    <div className="main">
      <div className="page">
        {selected.length === 0 && (
          <div className="alert alert-info" style={{marginBottom:16}}>
            Select chats in the Chats tab first
          </div>
        )}

        <div className="card">
          <div className="card-title">Compose Message</div>
          <div style={{display:'flex',gap:8,marginBottom:10}}>
            <button className="btn btn-secondary btn-sm" onClick={()=>setTplTab(false)} style={!tplTab?{borderColor:'var(--accent)',color:'var(--accent)'}:{}}>Compose</button>
            <button className="btn btn-secondary btn-sm" onClick={()=>setTplTab(true)} style={tplTab?{borderColor:'var(--accent)',color:'var(--accent)'}:{}}>Templates</button>
          </div>

          {!tplTab ? (
            <>
              <textarea placeholder="Type your broadcast message here..." value={message} onChange={e=>setMessage(e.target.value)} style={{minHeight:130}} />
              <div style={{fontSize:11,color:'var(--muted)',marginTop:4,textAlign:'right'}}>{message.length} chars / {selected.length} chats selected</div>

              {/* Attachment section */}
              <input
                type="file"
                ref={attachRef}
                style={{display:'none'}}
                accept="image/*,video/*,.pdf,.doc,.docx,.xls,.xlsx,.txt,.zip,.rar,.7z"
                onChange={handleFileChange}
              />
              <div className="attach-bar">
                <button
                  className="btn btn-secondary btn-sm"
                  onClick={() => attachRef.current && attachRef.current.click()}
                  disabled={polling}
                  style={attachment ? {borderColor:'var(--accent)',color:'var(--accent)'} : {}}
                >
                  {attachment ? 'Change File' : '+ Attach File'}
                </button>
                {!attachment && (
                  <span style={{fontSize:11,color:'var(--muted)'}}>images, video, PDF, archives...</span>
                )}
              </div>
              {attachment && (
                <AttachmentPreview file={attachment} onRemove={removeAttachment} />
              )}
            </>
          ) : (
            <div>
              <div style={{marginBottom:10}}>
                {templates.length === 0 && <p style={{color:'var(--muted)',fontSize:12}}>No templates saved yet</p>}
                {templates.map(t => (
                  <div key={t.id} style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,padding:'8px 10px',background:'var(--bg)',borderRadius:'var(--radius)',border:'1px solid var(--border)'}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,color:'var(--text)'}}>{t.name}</div>
                      <div style={{fontSize:11,color:'var(--muted)',marginTop:2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:300}}>{t.text}</div>
                    </div>
                    <button className="btn btn-secondary btn-sm" onClick={()=>{setMessage(t.text);setTplTab(false);}}>Use</button>
                    <button className="btn btn-sm" style={{background:'transparent',color:'var(--muted)',border:'none',padding:'4px 6px'}} onClick={()=>api.del('/api/templates/'+t.id).then(loadTemplates)}>x</button>
                  </div>
                ))}
              </div>
              <div className="sep"/>
              <label>New Template Name</label>
              <input type="text" placeholder="Template name" value={tplName} onChange={e=>setTplName(e.target.value)} />
              <label>Message Text</label>
              <textarea placeholder="Template message..." value={tplMsg} onChange={e=>setTplMsg(e.target.value)} style={{minHeight:80}} />
              <div style={{marginTop:10}}>
                <button className="btn btn-secondary btn-sm" onClick={doSaveTpl} disabled={!tplName||!tplMsg}>Save Template</button>
              </div>
            </div>
          )}
        </div>

        <div className="card">
        <div className="card-title">Broadcast Settings</div>

        <label>Delay between messages</label>
        <div className="slider-wrap">
          <div className="slider-row">
            <input type="range" min="1" max="60" step="1" value={delay} onChange={e=>setDelay(Number(e.target.value))} />
            <span className="slider-val">{delay}s</span>
          </div>
          <div className="slider-labels"><span>1s</span><span>15s</span><span>30s</span><span>60s</span></div>
        </div>

        <label style={{marginTop:18}}>Max messages per minute</label>
        <div className="slider-wrap">
          <div className="slider-row">
            <input type="range" min="1" max="30" step="1" value={maxPerMin} onChange={e=>setMaxPerMin(Number(e.target.value))} />
            <span className="slider-val">{maxPerMin}/m</span>
          </div>
          <div className="slider-labels"><span>1</span><span>10</span><span>20</span><span>30</span></div>
        </div>

        {(()=>{
          const safe = delay >= 15 && maxPerMin <= 5;
          const danger = delay < 5 || maxPerMin > 15;
          const warn = !safe && !danger && (delay < 8 || maxPerMin > 10);
          if (safe) return <div className="risk-box risk-safe"><span className="risk-icon">[OK]</span><div className="risk-text"><div className="risk-title">Safe mode  low risk</div><div className="risk-detail">Delay {delay}s + max {maxPerMin}/min. Great for new accounts, Telegram won't flag this.</div></div></div>;
          if (danger) return <div className="risk-box risk-danger"><span className="risk-icon">[!!]</span><div className="risk-text"><div className="risk-title">High risk  ban likely!</div><div className="risk-detail">{delay < 5 ? `Delay ${delay}s is too short. ` : ''}{maxPerMin > 15 ? `${maxPerMin}/min is too aggressive. ` : ''}Recommended: delay  8s, max  10/min.</div></div></div>;
          if (warn) return <div className="risk-box risk-warn"><span className="risk-icon">[!]</span><div className="risk-text"><div className="risk-title">Moderate risk  use carefully</div><div className="risk-detail">{delay < 8 ? `Delay ${delay}s is borderline. ` : ''}{maxPerMin > 10 ? `${maxPerMin}/min above safe threshold. ` : ''}OK for accounts 6m+. Enable random delay.</div></div></div>;
          return <div className="risk-box risk-safe"><span className="risk-icon">[OK]</span><div className="risk-text"><div className="risk-title">Normal mode  acceptable risk</div><div className="risk-detail">Delay {delay}s + {maxPerMin}/min. Fine for accounts 3m+ with random delay on.</div></div></div>;
        })()}

        <div className="toggle-row" style={{marginTop:14}}>
          <span className="toggle-label">Random delay (+0-10s)</span>
          <label className="toggle">
            <input type="checkbox" checked={randomDelay} onChange={e=>setRandomDelay(e.target.checked)} />
            <span className="toggle-slider"/>
          </label>
        </div>
        {randomDelay && <div style={{fontSize:11,color:'var(--muted)',marginTop:6}}>Will wait {delay}{delay+10}s between messages</div>}
      </div>
        <div style={{display:'flex',gap:10}}>
          <button className="btn btn-primary" style={{flex:1,justifyContent:'center'}}
            onClick={() => setConfirmOpen(true)}
            disabled={polling || !canStart}>
            {polling
              ? <><span className="spinner"/> Broadcasting...</>
              : `Start Broadcast (${selected.length} chats${attachment ? ' + file' : ''})`
            }
          </button>
          {polling && (
            <button className="btn btn-danger" onClick={doStop}>Stop</button>
          )}
        </div>

        {/* ── Confirm modal ── */}
        {confirmOpen && (
          <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}}>
            <div className="card" style={{width:420,maxWidth:'92vw',padding:24}}>
              <div className="card-title" style={{marginBottom:16}}>⚠️ Confirm Broadcast</div>
              <div style={{fontSize:13,color:'var(--muted)',marginBottom:12}}>You are about to send to <strong style={{color:'var(--text)'}}>{selected.length} chats</strong>:</div>
              <div style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,padding:12,fontSize:13,maxHeight:120,overflowY:'auto',whiteSpace:'pre-wrap',wordBreak:'break-word',color:'var(--text)',marginBottom:12}}>
                {message || <span style={{color:'var(--muted)',fontStyle:'italic'}}>(no text)</span>}
              </div>
              {attachment && (
                <div style={{fontSize:12,color:'var(--accent)',marginBottom:12}}>📎 {attachment.name}</div>
              )}
              <div style={{fontSize:12,color:'var(--muted)',marginBottom:20}}>
                Delay: {delay}s{randomDelay ? ` + random 0–10s` : ''} · Max {maxPerMin}/min
              </div>
              <div style={{display:'flex',gap:10}}>
                <button className="btn btn-primary" style={{flex:1,justifyContent:'center'}} onClick={doStart}>
                  ✅ Send it
                </button>
                <button className="btn btn-secondary" style={{flex:1,justifyContent:'center'}} onClick={() => setConfirmOpen(false)}>
                  Cancel
                </button>
              </div>
            </div>
          </div>
        )}

        {status && (
          <div className="card" style={{marginTop:16}}>
            <div className="card-title">Progress</div>
            {status.current_chat && (
              <div style={{marginBottom:10,display:'flex',alignItems:'center',gap:8}}>
                <span className="spinner"/>
                <span className="current-tag">Sending to: {status.current_chat}</span>
              </div>
            )}
            <div className="progress-bar">
              <div className="progress-fill" style={{width: progress + '%'}} />
            </div>
            <div style={{textAlign:'right',fontSize:11,color:'var(--muted)',marginBottom:12}}>{progress}% ({status.sent + status.failed}/{status.total})</div>
            <div className="stats-row">
              <div className="stat"><div className="stat-val val-blue">{status.total}</div><div className="stat-key">Total</div></div>
              <div className="stat"><div className="stat-val val-green">{status.sent}</div><div className="stat-key">Sent</div></div>
              <div className="stat"><div className="stat-val val-red">{status.failed}</div><div className="stat-key">Failed</div></div>
            </div>
            <div className="log-box" ref={logRef}>
              {(status.log || []).map((l,i) => <div key={i} className="log-line">{l}</div>)}
              {!status.running && status.finished && <div className="log-line" style={{color:'var(--green)',marginTop:8}}>-- BROADCAST COMPLETE --</div>}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function HistoryPage({ appUser }) {
  const [history, setHistory] = useState([]);
  const [selected, setSelected] = useState(null);
  useEffect(() => { api.get('/api/history').then(r => setHistory(r.history || [])); }, []);
  const isAdmin = appUser?.role === 'admin';

  return (
    <div className="page">
      <div className="card">
        <div className="card-title">Broadcast History</div>
        {history.length === 0 ? (
          <p style={{color:'var(--muted)',fontSize:12}}>No broadcasts yet</p>
        ) : (
          <div style={{overflowX:'auto'}}>
            <table>
              <thead>
                <tr>
                  {isAdmin && <th>User</th>}
                  <th>Message</th>
                  <th>Sent</th>
                  <th>Failed</th>
                  <th>Total</th>
                  <th>Started</th>
                </tr>
              </thead>
              <tbody>
                {history.map(h => (
                  <tr key={h.id} onClick={() => setSelected(h)}
                    style={{cursor:'pointer'}}
                    onMouseEnter={e => e.currentTarget.style.background='var(--card-hover, rgba(255,255,255,0.04))'}
                    onMouseLeave={e => e.currentTarget.style.background=''}>
                    {isAdmin && (
                      <td>
                        <span style={{
                          display:'inline-block',padding:'2px 8px',borderRadius:10,
                          fontSize:10,fontWeight:600,background:'var(--accent)22',
                          color:'var(--accent)',border:'1px solid var(--accent)44',
                          whiteSpace:'nowrap',
                        }}>{h.started_by || '—'}</span>
                      </td>
                    )}
                    <td style={{maxWidth:200,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{h.message || <span style={{color:'var(--muted)',fontStyle:'italic'}}>file only</span>}</td>
                    <td><span className="badge badge-green">{h.sent}</span></td>
                    <td><span className={`badge ${h.failed>0?'badge-red':'badge-green'}`}>{h.failed}</span></td>
                    <td>{h.total}</td>
                    <td style={{color:'var(--muted)',fontSize:11}}>{h.started_at?.slice(0,16).replace('T',' ')}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {/* ── Detail modal ── */}
      {selected && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}}
          onClick={() => setSelected(null)}>
          <div className="card" style={{width:480,maxWidth:'94vw',padding:24,maxHeight:'80vh',overflowY:'auto'}}
            onClick={e => e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div className="card-title" style={{margin:0}}>Broadcast Details</div>
              <button className="btn btn-secondary" style={{padding:'4px 12px',fontSize:12}} onClick={() => setSelected(null)}>✕ Close</button>
            </div>
            {isAdmin && selected.started_by && (
              <div style={{marginBottom:10,fontSize:12,color:'var(--muted)'}}>
                Started by: <strong style={{color:'var(--accent)'}}>{selected.started_by}</strong>
              </div>
            )}
            <div style={{fontSize:12,color:'var(--muted)',marginBottom:6}}>Message:</div>
            <div style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,padding:12,
              fontSize:13,whiteSpace:'pre-wrap',wordBreak:'break-word',color:'var(--text)',marginBottom:16,minHeight:40}}>
              {selected.message || <span style={{fontStyle:'italic',color:'var(--muted)'}}>no text (file only)</span>}
            </div>
            <div className="stats-row" style={{marginBottom:16}}>
              <div className="stat"><div className="stat-val val-blue">{selected.total}</div><div className="stat-key">Total</div></div>
              <div className="stat"><div className="stat-val val-green">{selected.sent}</div><div className="stat-key">Sent</div></div>
              <div className="stat"><div className="stat-val val-red">{selected.failed}</div><div className="stat-key">Failed</div></div>
            </div>
            <div style={{display:'flex',gap:16,fontSize:11,color:'var(--muted)',marginBottom: selected.log?.length ? 16 : 0}}>
              <span>Started: {selected.started_at?.slice(0,16).replace('T',' ')}</span>
              {selected.finished_at && <span>Finished: {selected.finished_at?.slice(0,16).replace('T',' ')}</span>}
            </div>
            {selected.log?.length > 0 && (
              <>
                <div style={{fontSize:12,color:'var(--muted)',marginBottom:6}}>Delivery log:</div>
                <div className="log-box" style={{maxHeight:200,fontSize:11}}>
                  {selected.log.map((l,i) => (
                    <div key={i} className="log-line" style={{
                      color: l.startsWith('OK') ? 'var(--green)' : l.startsWith('FAIL') ? 'var(--red,#f66)' : 'var(--muted)'
                    }}>{l}</div>
                  ))}
                </div>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  // appUser = { id, username, role } — app-level login via password
  const [appUser, setAppUser] = useState(() => getAppUser());
  // tgUser = { name, username } — Telegram session
  const [tgUser, setTgUser] = useState(null);
  const [tab, setTab] = useState('chats');
  const [selected, setSelected] = useState([]);
  const [checkingTg, setCheckingTg] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [showAdmin, setShowAdmin] = useState(false);
  const [showChangePw, setShowChangePw] = useState(false);

  const tryAutoTgLogin = useCallback(async () => {
    const tok = getSessionToken();
    const creds = getTgCreds();
    if (!tok && !creds) return;
    setCheckingTg(true);
    try {
      // Try existing session first
      if (tok) {
        const url = API_BASE + '/api/me?session_token=' + encodeURIComponent(tok);
        const r = await fetch(url, { headers: { 'Authorization': 'Bearer ' + getAppToken() } });
        if (r.ok) {
          const me = await r.json();
          if (me && me.name) { setTgUser(me); setCheckingTg(false); return; }
        }
      }
      // Session dead but we have creds — reconnect silently
      if (creds) {
        const r2 = await api.post('/api/connect', { api_id: parseInt(creds.apiId), api_hash: creds.apiHash });
        if (r2.session_token) setSessionToken(r2.session_token);
        if (r2.authorized) {
          const qs2 = r2.session_token ? '?session_token=' + encodeURIComponent(r2.session_token) : '';
          const me2 = await api.get('/api/me' + qs2);
          if (me2 && me2.name) { setTgUser(me2); setCheckingTg(false); return; }
        }
        // Not authorized — session file gone, need re-auth (can't skip SMS)
        // But phone is pre-filled so user just clicks Send Code
      }
    } catch {}
    setCheckingTg(false);
  }, []);

  const handleSettingsSave = () => { setShowSettings(false); tryAutoTgLogin(); };

  useEffect(() => {
    if (!showSettings && appUser) tryAutoTgLogin();
  }, [appUser]);

  const handleAppLogin = (u) => { setAppUser(u); };

  const handleTgAuth = (me) => { setTgUser(me); };

  const doLogout = async () => {
    const tok = getSessionToken();
    if (tok) {
      try { await fetch(API_BASE + '/api/logout?session_token=' + encodeURIComponent(tok), {
        method: 'POST', headers: allHeaders({'Content-Type':'application/json'}), body: '{}'
      }); } catch {}
    }
    clearSessionToken(); localStorage.removeItem('tgb_phone');
    clearAppToken(); clearAppUserData();
    setTgUser(null); setAppUser(null); setSelected([]);
  };

  // Role helpers
  const isAdmin = appUser?.role === 'admin';

  if (showSettings) return <SettingsScreen onSave={handleSettingsSave} />;

  // Step 1: app login
  if (!appUser) return <AppLoginScreen onLogin={handleAppLogin} />;

  // Step 2: Telegram login
  if (checkingTg) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',gap:12}}>
      <span className="spinner"/> <span style={{color:'var(--muted)'}}>Connecting...</span>
    </div>
  );
  if (!tgUser) return <LoginPage onAuth={handleTgAuth} appUser={appUser} onAppLogout={()=>{clearAppToken();clearAppUserData();setAppUser(null);}} />;

  const navTabs = [
    ['chats', 'Chats'],
    ['broadcast', 'Broadcast' + (selected.length ? ` (${selected.length})` : '')],
    ['history', 'History'],
  ];

  return (
    <>
      <div className="header">
        <div className="header-logo">
          <div>
            <div className="logo-text">Telegram Broadcast</div>
            <div className="logo-sub">Evoplay User Client</div>
          </div>
        </div>
        <div className="header-user">
          <div className="status-dot"/>
          <span style={{fontWeight:600}}>{tgUser.name || tgUser.username}</span>
          <span style={{
            fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:10,
            background: isAdmin ? 'var(--accent)22' : 'var(--surface2)',
            color: isAdmin ? 'var(--accent)' : 'var(--muted)',
            border: `1px solid ${isAdmin ? 'var(--accent)44' : 'var(--border)'}`,
          }}>{appUser.username} · {appUser.role}</span>
          <span style={{color:'var(--border)'}}>|</span>
          {isAdmin && (
            <button className="btn btn-secondary btn-sm"
              onClick={()=>setShowAdmin(true)}
              style={{marginRight:4,color:'var(--accent)',borderColor:'var(--accent)44'}}>
              Admin
            </button>
          )}
          <button className="btn btn-secondary btn-sm" onClick={()=>setShowChangePw(true)} style={{marginRight:4}}>My Password</button>
          <button className="btn btn-secondary btn-sm" onClick={()=>setShowSettings(true)} style={{marginRight:4}}>Settings</button>
          <button className="btn btn-secondary btn-sm" onClick={doLogout}>Logout</button>
        </div>
      </div>
      <div className="nav">
        {navTabs.map(([k,l]) => (
          <button key={k} className={`nav-btn ${tab===k?'active':''}`} onClick={()=>setTab(k)}>{l}</button>
        ))}
      </div>
      <div style={{flex:1,overflow:'auto'}}>
        {tab === 'chats' && <ChatsPage selected={selected} setSelected={setSelected} appUser={appUser} />}
        {tab === 'broadcast' && <BroadcastPage selected={selected} appUser={appUser} />}
        {tab === 'history' && <HistoryPage appUser={appUser} />}
      </div>
      {showAdmin && <AdminPanel appUser={appUser} onClose={()=>setShowAdmin(false)} />}
      {showChangePw && <ChangeMyPasswordModal onClose={()=>setShowChangePw(false)} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
