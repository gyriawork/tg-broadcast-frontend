<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Broadcast Service</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0e1520;
    --surface2: #152030;
    --border: #1e3040;
    --accent: #00d4ff;
    --accent2: #0090cc;
    --green: #00ff88;
    --red: #ff4466;
    --yellow: #ffcc00;
    --text: #c8dde8;
    --muted: #4a6070;
    --radius: 6px;
    --slack: #e01e5a;
    --tg: #2aabee;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px; }
  #root { min-height: 100vh; display: flex; flex-direction: column; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 28px; border-bottom: 1px solid var(--border);
    background: var(--surface); position: sticky; top: 0; z-index: 100;
  }
  .header-logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: var(--accent); letter-spacing: -0.5px; }
  .logo-sub { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
  .header-user { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }

  .nav { display: flex; gap: 2px; padding: 12px 28px; border-bottom: 1px solid var(--border); background: var(--bg); }
  .nav-btn {
    padding: 6px 16px; border-radius: var(--radius); cursor: pointer; border: none;
    background: transparent; color: var(--muted); font-family: inherit; font-size: 12px;
    letter-spacing: 1px; text-transform: uppercase; transition: all .2s;
  }
  .nav-btn:hover { color: var(--text); background: var(--surface); }
  .nav-btn.active { color: var(--accent); background: var(--surface); border-bottom: 2px solid var(--accent); }

  .main { flex: 1; display: flex; gap: 0; overflow: hidden; }
  .page { flex: 1; padding: 28px; overflow-y: auto; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  .card-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; color: var(--accent); margin-bottom: 16px; letter-spacing: 0.5px; text-transform: uppercase; }

  label { display: block; font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; margin-top: 14px; }
  label:first-of-type { margin-top: 0; }
  input[type="text"], input[type="tel"], input[type="number"], input[type="password"], textarea {
    width: 100%; padding: 10px 12px; border-radius: var(--radius);
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    font-family: inherit; font-size: 13px; outline: none; transition: border-color .2s;
  }
  input:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 100px; }

  .btn {
    display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px;
    border-radius: var(--radius); border: none; cursor: pointer; font-family: inherit;
    font-size: 12px; font-weight: 500; letter-spacing: 0.5px; transition: all .2s;
  }
  .btn-primary { background: var(--accent); color: var(--bg); }
  .btn-primary:hover { background: #00b8e0; transform: translateY(-1px); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-danger:hover { background: #e0003a; }
  .btn-success { background: var(--green); color: var(--bg); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-sm { padding: 6px 12px; font-size: 11px; }

  .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; }
  .toggle-label { font-size: 12px; color: var(--text); }
  .toggle { position: relative; width: 40px; height: 22px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: var(--border); border-radius: 11px; cursor: pointer; transition: .3s;
  }
  .toggle-slider:before {
    position: absolute; content: ''; height: 16px; width: 16px; left: 3px; bottom: 3px;
    background: var(--muted); border-radius: 50%; transition: .3s;
  }
  input:checked + .toggle-slider { background: var(--accent2); }
  input:checked + .toggle-slider:before { transform: translateX(18px); background: var(--accent); }

  .chat-list { max-height: 420px; overflow-y: auto; }
  .chat-item {
    display: flex; align-items: center; gap: 12px; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 6px;
    cursor: pointer; transition: all .15s;
  }
  .chat-item:hover { border-color: var(--accent2); background: var(--surface2); }
  .chat-item.selected { border-color: var(--accent); background: rgba(0,212,255,0.06); }
  .chat-avatar {
    width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: bold; flex-shrink: 0;
  }
  .chat-info { flex: 1; min-width: 0; }
  .chat-name { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chat-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .chat-check { width: 18px; height: 18px; border: 2px solid var(--border); border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .chat-item.selected .chat-check { background: var(--accent); border-color: var(--accent); }

  .progress-bar { width: 100%; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin: 12px 0; }
  .progress-fill { height: 100%; background: var(--accent); transition: width .3s; }
  .stats-row { display: flex; gap: 16px; margin: 12px 0; }
  .stat { flex: 1; text-align: center; padding: 10px; background: var(--bg); border-radius: var(--radius); border: 1px solid var(--border); }
  .stat-val { font-size: 24px; font-family: 'Syne', sans-serif; font-weight: 800; }
  .stat-key { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
  .val-green { color: var(--green); }
  .val-red { color: var(--red); }
  .val-blue { color: var(--accent); }

  .log-box {
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px; font-size: 12px; line-height: 1.7; max-height: 260px; overflow-y: auto;
    font-family: 'JetBrains Mono', monospace;
  }
  .log-line { padding: 1px 0; }

  .login-wrap { max-width: 440px; margin: 60px auto; }
  .login-hero { text-align: center; margin-bottom: 32px; }
  .login-hero h1 { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; color: var(--accent); }
  .login-hero p { color: var(--muted); margin-top: 8px; font-size: 12px; }

  .alert { padding: 10px 14px; border-radius: var(--radius); font-size: 12px; margin-top: 12px; }
  .alert-err { background: rgba(255,68,102,0.1); border: 1px solid rgba(255,68,102,0.3); color: var(--red); }
  .alert-ok { background: rgba(0,255,136,0.08); border: 1px solid rgba(0,255,136,0.25); color: var(--green); }
  .alert-info { background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.2); color: var(--accent); }

  .sidebar { width: 280px; background: var(--surface); border-left: 1px solid var(--border); padding: 20px; overflow-y: auto; }
  .sidebar-title { font-size: 11px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 12px; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; letter-spacing: 0.5px; }
  .badge-blue { background: rgba(0,212,255,0.15); color: var(--accent); }
  .badge-green { background: rgba(0,255,136,0.12); color: var(--green); }
  .badge-red { background: rgba(255,68,102,0.12); color: var(--red); }
  .badge-tg { background: rgba(42,171,238,0.12); color: var(--tg); }
  .badge-slack { background: rgba(224,30,90,0.12); color: var(--slack); }
  .badge-mixed { background: rgba(255,204,0,0.12); color: var(--yellow); }

  table { width: 100%; border-collapse: collapse; }
  th { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text); }
  tr:hover td { background: var(--surface2); }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .row-gap { display: flex; gap: 10px; align-items: flex-end; margin-top: 14px; }
  .sep { height: 1px; background: var(--border); margin: 16px 0; }
  .selected-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .search-row { margin-bottom: 10px; }
  .current-tag { font-size: 11px; color: var(--accent); padding: 3px 8px; border: 1px solid var(--accent2); border-radius: 4px; }
  .filter-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .filter-btn { padding: 4px 12px; border-radius: 20px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: inherit; font-size: 11px; transition: all .2s; }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,0.08); }
  .integration-status { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 11px; }
  .int-active { background: rgba(0,255,136,0.08); border: 1px solid rgba(0,255,136,0.2); color: var(--green); }
  .int-inactive { background: rgba(74,96,112,0.15); border: 1px solid var(--border); color: var(--muted); }
  .settings-tab { padding: 8px 16px; border-radius: var(--radius) var(--radius) 0 0; cursor: pointer; border: 1px solid var(--border); border-bottom: none; background: transparent; color: var(--muted); font-family: inherit; font-size: 12px; transition: all .2s; }
  .settings-tab.active { background: var(--surface); color: var(--accent); }

  .dash-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .dash-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; }
  .dash-card-val { font-size: 28px; font-family: 'Syne', sans-serif; font-weight: 800; color: var(--accent); }
  .dash-card-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }
  .bar-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .bar-name { width: 140px; font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
  .bar-fill-bg { flex: 1; height: 20px; background: var(--bg); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width .3s; min-width: 2px; }
  .bar-count { width: 50px; text-align: right; font-size: 12px; color: var(--muted); flex-shrink: 0; }
  .acc-checkbox { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
  .bulk-bar { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--accent2); border-radius: var(--radius); margin-bottom: 12px; }
  .tag-chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 10px; font-size: 10px; background: rgba(0,212,255,0.1); color: var(--accent); border: 1px solid var(--accent2); }
  .tag-chip-rm { cursor: pointer; font-size: 12px; opacity: 0.6; }
  .tag-chip-rm:hover { opacity: 1; }
  .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 500; display: flex; align-items: center; justify-content: center; }
  .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; min-width: 360px; max-width: 480px; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }

  body::before {
    content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,212,255,0.01) 2px, rgba(0,212,255,0.01) 4px);
    pointer-events: none; z-index: 9999;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, useRef, useCallback } = React;
const h = React.createElement;
const F = React.Fragment;

// ── API config ──────────────────────────────────────────────────────────────
function getApiBase() {
  return sessionStorage.getItem('api_base') || 'https://web-production-b8b8b.up.railway.app';
}
let API_BASE = getApiBase();
let JWT_TOKEN = sessionStorage.getItem('jwt_token') || '';
let TG_SESSION = sessionStorage.getItem('tg_session') || '';
let SLACK_SESSION = sessionStorage.getItem('slack_session') || '';

function setJwt(t) { JWT_TOKEN = t; if(t) sessionStorage.setItem('jwt_token',t); else sessionStorage.removeItem('jwt_token'); }
function setTgSession(t) { TG_SESSION = t; if(t) sessionStorage.setItem('tg_session',t); else sessionStorage.removeItem('tg_session'); }
function setSlackSession(t) { SLACK_SESSION = t; if(t) sessionStorage.setItem('slack_session',t); else sessionStorage.removeItem('slack_session'); }

function apiHeaders() {
  const h = {'Content-Type':'application/json'};
  if (JWT_TOKEN) h['Authorization'] = 'Bearer ' + JWT_TOKEN;
  if (TG_SESSION) h['X-Session-Token'] = TG_SESSION;
  if (SLACK_SESSION) h['X-Slack-Session-Token'] = SLACK_SESSION;
  return h;
}

const api = {
  get: (path) => fetch(API_BASE+path, {headers:apiHeaders()}).then(r => {if(!r.ok) return r.json().then(e=>{throw new Error(e.detail||r.status)}).catch(()=>{throw new Error(r.status)}); return r.json();}),
  post: (path, body) => fetch(API_BASE+path, {method:'POST', headers:apiHeaders(), body:JSON.stringify(body)}).then(r => {if(!r.ok) return r.json().then(e=>{throw new Error(e.detail||r.status)}); return r.json();}),
  put: (path, body) => fetch(API_BASE+path, {method:'PUT', headers:apiHeaders(), body:JSON.stringify(body)}).then(r => {if(!r.ok) return r.json().then(e=>{throw new Error(e.detail||r.status)}); return r.json();}),
  del: (path) => fetch(API_BASE+path, {method:'DELETE', headers:apiHeaders()}).then(r => r.json()),
  del_body: (path, body) => fetch(API_BASE+path, {method:'DELETE', headers:apiHeaders(), body:JSON.stringify(body)}).then(r => r.json()),
};

// ── Settings Screen (backend URL) ───────────────────────────────────────────
function SettingsScreen({onSave}) {
  const [url, setUrl] = useState(API_BASE);
  const [testing, setTesting] = useState(false);
  const [err, setErr] = useState('');
  const [ok, setOk] = useState(false);
  const test = async () => {
    setTesting(true); setErr(''); setOk(false);
    try { const r = await fetch(url.replace(/\/$/,'')+'/health'); if(r.ok) setOk(true); else setErr('Error: '+r.status); }
    catch(e) { setErr('Cannot connect'); } setTesting(false);
  };
  const save = () => { const c=url.replace(/\/$/,''); sessionStorage.setItem('api_base',c); API_BASE=c; onSave(); };
  return h('div',{className:'login-wrap'},
    h('div',{className:'login-hero'}, h('h1',null,'Broadcast Service'), h('p',null,'Enter your backend URL')),
    h('div',{className:'card'},
      h('div',{className:'card-title'},'Backend URL'),
      h('label',null,'URL'),
      h('input',{type:'text',placeholder:'https://your-app.railway.app',value:url,onChange:e=>setUrl(e.target.value)}),
      err && h('div',{className:'alert alert-err'},err),
      ok && h('div',{className:'alert alert-ok'},'Server reachable!'),
      h('div',{className:'row-gap'},
        h('button',{className:'btn btn-secondary',onClick:test,disabled:testing}, testing?h(F,null,h('span',{className:'spinner'}),' Testing...'):'Test'),
        h('button',{className:'btn btn-primary',onClick:save,disabled:!url},'Save')
      )
    )
  );
}

// ── App Login Page ──────────────────────────────────────────────────────────
function AppLoginPage({onAuth}) {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');

  const doLogin = async () => {
    setLoading(true); setErr('');
    try {
      const r = await fetch(API_BASE+'/api/auth/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username,password})});
      if (!r.ok) { const e = await r.json(); throw new Error(e.detail||'Login failed'); }
      const data = await r.json();
      setJwt(data.token);
      onAuth({username:data.username, role:data.role, id:data.id, company_id:data.company_id||null, company_name:data.company_name||null});
    } catch(e) { setErr(e.message); }
    setLoading(false);
  };

  return h('div',{className:'login-wrap'},
    h('div',{className:'login-hero'}, h('h1',null,'Broadcast Service'), h('p',null,'Multi-platform broadcast tool')),
    h('div',{className:'card'},
      h('div',{className:'card-title'},'Login'),
      h('label',null,'Username'),
      h('input',{type:'text',value:username,onChange:e=>setUsername(e.target.value),placeholder:'admin'}),
      h('label',null,'Password'),
      h('input',{type:'password',value:password,onChange:e=>setPassword(e.target.value),onKeyDown:e=>{if(e.key==='Enter')doLogin()}}),
      err && h('div',{className:'alert alert-err'},err),
      h('div',{style:{marginTop:16}},
        h('button',{className:'btn btn-primary',onClick:doLogin,disabled:loading||!username||!password},
          loading ? h(F,null,h('span',{className:'spinner'}),' Logging in...') : 'Login')
      )
    )
  );
}

// ── Settings Page (Integrations + Security + Users) ─────────────────────────
function SettingsPage({integrations, onRefresh, appUser}) {
  const [tab, setTab] = useState('integrations');
  const isCompanyAdmin = appUser && appUser.role === 'company_admin';

  const tabs = [
    ['integrations', 'Integrations'],
    ['security', 'Security']
  ];
  if (isCompanyAdmin) tabs.push(['users', 'Users']);

  return h('div',{className:'page'},
    h('div',{className:'card'},
      h('div',{style:{display:'flex',gap:4,marginBottom:16}},
        tabs.map(([k,l]) => h('button',{key:k,className:'settings-tab'+(tab===k?' active':''),onClick:()=>setTab(k)},l))
      ),
      tab==='integrations' && h(F, null,
        h('div',{className:'card-title'},'Integrations'),
        h(IntegrationsSubTabs, {integrations, onRefresh})
      ),
      tab==='security' && h(F, null,
        h('div',{className:'card-title'},'Change Password'),
        h(SecuritySettings, null)
      ),
      tab==='users' && isCompanyAdmin && h(CompanyUserManagement, null)
    )
  );
}

function IntegrationsSubTabs({integrations, onRefresh}) {
  const [sub, setSub] = useState('telegram');
  return h(F, null,
    h('div',{style:{display:'flex',gap:4,marginBottom:16}},
      h('button',{className:'settings-tab'+(sub==='telegram'?' active':''),onClick:()=>setSub('telegram')},'Telegram'),
      h('button',{className:'settings-tab'+(sub==='slack'?' active':''),onClick:()=>setSub('slack')},'Slack')
    ),
    sub==='telegram' && h(TelegramSettings,{info:integrations?.telegram,onRefresh}),
    sub==='slack' && h(SlackSettings,{info:integrations?.slack,onRefresh})
  );
}

function TelegramSettings({info, onRefresh}) {
  const [step, setStep] = useState('config');
  const [apiId, setApiId] = useState('');
  const [apiHash, setApiHash] = useState('');
  const [phone, setPhone] = useState('');
  const [code, setCode] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  const [msg, setMsg] = useState('');

  const doConnect = async () => {
    setLoading(true); setErr('');
    try {
      const r = await api.post('/api/connect',{api_id:parseInt(apiId),api_hash:apiHash});
      setTgSession(r.session_token);
      if (r.authorized) { setMsg('Connected!'); onRefresh(); }
      else setStep('phone');
    } catch(e) { setErr(e.message); } setLoading(false);
  };
  const doPhone = async () => {
    setLoading(true); setErr('');
    try { await api.post('/api/send_code',{phone}); setStep('code'); setMsg('Code sent!'); }
    catch(e) { setErr(e.message); } setLoading(false);
  };
  const doCode = async () => {
    setLoading(true); setErr('');
    try {
      await api.post('/api/verify_code',{code,password:password||null});
      setMsg('Telegram connected!'); onRefresh();
    } catch(e) {
      if (e.message&&e.message.includes('2FA')) setStep('2fa');
      else setErr(e.message);
    } setLoading(false);
  };
  const doDisconnect = async () => {
    try { await api.post('/api/logout',{}); } catch(e) {}
    setTgSession(''); setStep('config'); setMsg(''); onRefresh();
  };

function SlackSettings({info, onRefresh}) {
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  const [botToken, setBotToken] = useState('');
  const [showManual, setShowManual] = useState(false);

  const doOAuth = async () => {
    setLoading(true); setErr('');
    try {
      const r = await api.get('/api/slack/oauth/start');
      window.location.href = r.url;
    } catch(e) {
      setErr(e.message);
      setShowManual(true);
    } setLoading(false);
  };

  const doManualConnect = async () => {
    setLoading(true); setErr('');
    try {
      const r = await api.post('/api/slack/connect',{bot_token:botToken});
      setSlackSession(r.slack_session_token);
      onRefresh();
    } catch(e) { setErr(e.message); } setLoading(false);
  };

  const doDisconnect = async () => {
    try { await api.post('/api/slack/disconnect',{}); } catch(e) {}
    setSlackSession(''); onRefresh();
  };

  if (info?.connected) {
    return h(F,null,
      h('div',{style:{display:'flex',alignItems:'center',gap:12,marginBottom:16}},
        h('span',{className:'integration-status int-active'},'Active'),
        h('span',{style:{color:'var(--text)'}},info.team||'Connected')
      ),
      h('button',{className:'btn btn-danger btn-sm',onClick:doDisconnect},'Disconnect')
    );
  }

  return h(F,null,
    h('div',{style:{marginBottom:12}}, h('span',{className:'integration-status int-inactive'},'Not connected')),
    h('p',{style:{fontSize:12,color:'var(--muted)',marginBottom:12}},
      'Connect your Slack workspace via OAuth or enter a Bot Token manually.'),
    h('button',{className:'btn btn-primary',onClick:doOAuth,disabled:loading,style:{background:'var(--slack)'}},
      loading?h(F,null,h('span',{className:'spinner'}),' Redirecting...'):'Add to Slack'),
    err && h('div',{className:'alert alert-err'},err),
    (showManual || !err) && h(F,null,
      h('div',{className:'sep'}),
      h('p',{style:{fontSize:11,color:'var(--muted)',marginBottom:8}},'Or connect manually with Bot Token:'),
      h('label',null,'Bot Token'),
      h('input',{type:'text',placeholder:'xoxb-...',value:botToken,onChange:e=>setBotToken(e.target.value)}),
      h('div',{style:{marginTop:10}},
        h('button',{className:'btn btn-secondary btn-sm',onClick:doManualConnect,disabled:loading||!botToken},'Connect with Token'))
    )
  );
}

// ── Security Settings (Change Password) ─────────────────────────────────────
function SecuritySettings() {
  const [curPwd, setCurPwd] = useState('');
  const [newPwd, setNewPwd] = useState('');
  const [confirmPwd, setConfirmPwd] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  const [ok, setOk] = useState('');

  const doChange = async () => {
    setErr(''); setOk('');
    if (newPwd !== confirmPwd) { setErr('Passwords do not match'); return; }
    if (newPwd.length < 4) { setErr('Password too short (min 4 chars)'); return; }
    setLoading(true);
    try {
      await api.post('/api/auth/me/password', {current_password: curPwd, new_password: newPwd});
      setOk('Password changed! Please re-login.');
      setCurPwd(''); setNewPwd(''); setConfirmPwd('');
      setTimeout(() => { setJwt(''); window.location.reload(); }, 2000);
    } catch(e) { setErr(e.message); }
    setLoading(false);
  };

  return h(F, null,
    h('label', null, 'Current Password'),
    h('input', {type:'password', value:curPwd, onChange:e=>setCurPwd(e.target.value)}),
    h('label', null, 'New Password'),
    h('input', {type:'password', value:newPwd, onChange:e=>setNewPwd(e.target.value)}),
    h('label', null, 'Confirm New Password'),
    h('input', {type:'password', value:confirmPwd, onChange:e=>setConfirmPwd(e.target.value)}),
    err && h('div', {className:'alert alert-err'}, err),
    ok && h('div', {className:'alert alert-ok'}, ok),
    h('div', {style:{marginTop:14}},
      h('button', {className:'btn btn-primary', onClick:doChange, disabled:loading||!curPwd||!newPwd||!confirmPwd},
        loading ? h(F,null,h('span',{className:'spinner'}),' Changing...') : 'Change Password'))
  );
}

// ── Company User Management (for company_admin) ────────────────────────────
function CompanyUserManagement() {
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showCreate, setShowCreate] = useState(false);
  const [newUser, setNewUser] = useState('');
  const [newPwd, setNewPwd] = useState('');
  const [err, setErr] = useState('');
  const [msg, setMsg] = useState('');
  const [resetInfo, setResetInfo] = useState(null);

  useEffect(() => { loadUsers(); }, []);

  const loadUsers = async () => {
    setLoading(true);
    try { const r = await api.get('/api/auth/users'); setUsers(r.users||[]); }
    catch(e) { setErr(e.message); }
    setLoading(false);
  };

  const doCreate = async () => {
    setErr(''); setMsg('');
    if (!newUser) return;
    try {
      const body = {username: newUser, role: 'user'};
      if (newPwd) body.password = newPwd;
      const r = await api.post('/api/auth/users', body);
      setMsg('User created! Password: ' + (r.generated_password || newPwd));
      setNewUser(''); setNewPwd(''); setShowCreate(false); loadUsers();
    } catch(e) { setErr(e.message); }
  };

  const doResetPwd = async (uid) => {
    try {
      const r = await fetch(API_BASE+'/api/auth/users/'+uid+'/password', {
        method:'PUT', headers:apiHeaders(), body:JSON.stringify({})
      }).then(r=>r.json());
      setResetInfo({uid, password: r.generated_password || 'Reset done'});
    } catch(e) { setErr(e.message); }
  };

  const doToggleActive = async (uid, current) => {
    try {
      await fetch(API_BASE+'/api/auth/users/'+uid+'/active', {
        method:'PUT', headers:apiHeaders(), body:JSON.stringify({is_active: current ? 0 : 1})
      });
      loadUsers();
    } catch(e) { setErr(e.message); }
  };

  const doDelete = async (uid) => {
    if (!confirm('Delete this user?')) return;
    try { await api.del('/api/auth/users/'+uid); loadUsers(); }
    catch(e) { setErr(e.message); }
  };

  return h('div', null,
    h('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
      h('div', {className:'card-title', style:{marginBottom:0}}, 'Company Users'),
      h('button', {className:'btn btn-primary btn-sm', onClick:()=>setShowCreate(!showCreate)}, showCreate ? 'Cancel' : '+ Create User')
    ),
    err && h('div', {className:'alert alert-err', style:{marginBottom:12}}, err),
    msg && h('div', {className:'alert alert-ok', style:{marginBottom:12}}, msg),
    resetInfo && h('div', {className:'alert alert-info', style:{marginBottom:12}},
      'Password for user #'+resetInfo.uid+': ', h('strong',null,resetInfo.password),
      h('button',{className:'btn btn-sm',style:{marginLeft:10,background:'transparent',border:'none',color:'var(--accent)'},onClick:()=>setResetInfo(null)},'Dismiss')),
    showCreate && h('div', {style:{marginBottom:16,padding:16,background:'var(--bg)',borderRadius:'var(--radius)',border:'1px solid var(--border)'}},
      h('label', null, 'Username'), h('input', {type:'text', value:newUser, onChange:e=>setNewUser(e.target.value)}),
      h('label', null, 'Password (leave empty to auto-generate)'), h('input', {type:'password', value:newPwd, onChange:e=>setNewPwd(e.target.value)}),
      h('div', {style:{marginTop:10}}, h('button', {className:'btn btn-primary btn-sm', onClick:doCreate, disabled:!newUser}, 'Create'))
    ),
    loading ? h('div',{style:{textAlign:'center',padding:20}},h('span',{className:'spinner'})) :
    h('table', null,
      h('thead', null, h('tr', null,
        h('th', null, 'Username'), h('th', null, 'Role'), h('th', null, 'Status'), h('th', null, 'Actions'))),
      h('tbody', null,
        users.map(u => h('tr', {key:u.id},
          h('td', null, u.username),
          h('td', null, h('span', {className:'badge '+(u.role==='company_admin'?'badge-blue':'badge-green')}, u.role)),
          h('td', null, h('span', {className:'badge '+(u.is_active!==0?'badge-green':'badge-red')}, u.is_active!==0?'Active':'Inactive')),
          h('td', null,
            u.role !== 'company_admin' && h(F, null,
              h('button', {className:'btn btn-secondary btn-sm', style:{marginRight:4}, onClick:()=>doResetPwd(u.id)}, 'Reset Pwd'),
              h('button', {className:'btn btn-secondary btn-sm', style:{marginRight:4}, onClick:()=>doToggleActive(u.id, u.is_active!==0)}, u.is_active!==0?'Deactivate':'Activate'),
              h('button', {className:'btn btn-danger btn-sm', onClick:()=>doDelete(u.id)}, 'Delete')
            )
          )
        ))
      )
    )
  );
}

      h('div', {className:'stats-row'},
        h('div', {className:'stat'}, h('div', {className:'stat-val val-blue'}, sessions.telegram_sessions || 0), h('div', {className:'stat-key'}, 'Telegram')),
        h('div', {className:'stat'}, h('div', {className:'stat-val val-blue'}, sessions.slack_sessions || 0), h('div', {className:'stat-key'}, 'Slack'))
      )
    )
  );
}

// ── Unified Chats Page ──────────────────────────────────────────────────────
function UnifiedChatsPage({selected, setSelected}) {
  const [chats, setChats] = useState([]);
  const [loading, setLoading] = useState(false);
  const [search, setSearch] = useState('');
  const [platformFilter, setPlatformFilter] = useState('all');
  const [typeFilter, setTypeFilter] = useState('all');
  const [lists, setLists] = useState([]);
  const [saveListName, setSaveListName] = useState('');
  const [err, setErr] = useState('');
  const [msg, setMsg] = useState('');

  useEffect(() => { loadLists(); }, []);

  const loadChats = async () => {
    setLoading(true); setErr('');
    try { const r = await api.get('/api/unified/chats'); setChats(r.chats); }
    catch(e) { setErr('Failed to load chats: '+e.message); }
    setLoading(false);
  };

  const loadLists = async () => {
    try { const r = await api.get('/api/unified/lists'); setLists(r.lists||[]); } catch(e) {}
  };

  const toggle = (id) => setSelected(prev => prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);

  const filtered = chats.filter(c => {
    if (search && !c.name.toLowerCase().includes(search.toLowerCase())) return false;
    if (platformFilter!=='all' && c.platform!==platformFilter) return false;
    if (typeFilter!=='all' && c.type!==typeFilter) return false;
    return true;
  });

  const selectAll = () => setSelected(prev => [...new Set([...prev, ...filtered.map(c=>c.id)])]);
  const clearAll = () => setSelected([]);

  const doSaveList = async () => {
    if (!saveListName||!selected.length) return;
    await api.post('/api/unified/lists',{name:saveListName,chat_ids:selected});
    setSaveListName(''); setMsg('List saved!'); loadLists();
    setTimeout(()=>setMsg(''),2500);
  };

  const loadSavedList = (lst) => setSelected(lst.chats);
  const deleteList = async (id) => { await api.del('/api/unified/lists/'+id); loadLists(); };

  const tgCount = selected.filter(id=>id.startsWith('tg:')).length;
  const slackCount = selected.filter(id=>id.startsWith('slack:')).length;

  const avatarStyle = (c) => {
    if (c.platform==='telegram') return {background:'rgba(42,171,238,0.15)',color:'var(--tg)'};
    return {background:'rgba(224,30,90,0.15)',color:'var(--slack)'};
  };
  const avatarChar = (c) => c.platform==='slack'?'#':c.name.charAt(0).toUpperCase();

  return h('div',{className:'main'},
    h('div',{className:'page'},
      h('div',{className:'card'},
        h('div',{className:'card-title'},'Load Chats'),
        h('div',{style:{display:'flex',gap:10}},
          h('button',{className:'btn btn-primary',onClick:loadChats,disabled:loading},
            loading?h(F,null,h('span',{className:'spinner'}),' Loading...'):'Load All Chats'),
          chats.length>0 && h('span',{style:{color:'var(--muted)',alignSelf:'center',fontSize:12}},chats.length+' chats')
        ),
        err && h('div',{className:'alert alert-err',style:{marginTop:10}},err)
      ),
      chats.length>0 && h('div',{className:'card'},
        h('div',{className:'selected-bar'},
          h('div',{className:'card-title',style:{marginBottom:0}},
            'Chats ',
            h('span',{className:'badge badge-blue',style:{marginLeft:8}},selected.length+' selected'),
            tgCount>0 && h('span',{className:'badge badge-tg',style:{marginLeft:4}},tgCount+' TG'),
            slackCount>0 && h('span',{className:'badge badge-slack',style:{marginLeft:4}},slackCount+' Slack')
          ),
          h('div',{style:{display:'flex',gap:8}},
            h('button',{className:'btn btn-secondary btn-sm',onClick:selectAll},'Select All'),
            h('button',{className:'btn btn-secondary btn-sm',onClick:clearAll},'Clear'))
        ),
        h('div',{className:'filter-row'},
          ['all','telegram','slack'].map(f=>
            h('button',{key:f,className:'filter-btn'+(platformFilter===f?' active':''),onClick:()=>setPlatformFilter(f)},
              f==='all'?'All':f==='telegram'?'Telegram':'Slack')),
          h('span',{style:{color:'var(--border)',margin:'0 4px'}},'|'),
          ['all','channel','group','dm'].map(f=>
            h('button',{key:f,className:'filter-btn'+(typeFilter===f?' active':''),onClick:()=>setTypeFilter(f)},
              f==='all'?'All Types':f.charAt(0).toUpperCase()+f.slice(1)))
        ),
        h('div',{className:'search-row'},
          h('input',{type:'text',placeholder:'Search chats...',value:search,onChange:e=>setSearch(e.target.value)})),
        h('div',{className:'chat-list'},
          filtered.map(c=>
            h('div',{key:c.id,className:'chat-item'+(selected.includes(c.id)?' selected':''),onClick:()=>toggle(c.id)},
              h('div',{className:'chat-avatar',style:avatarStyle(c)},avatarChar(c)),
              h('div',{className:'chat-info'},
                h('div',{className:'chat-name'},c.name),
                h('div',{className:'chat-meta'},
                  h('span',{className:'badge badge-'+(c.platform==='telegram'?'tg':'slack')},c.platform==='telegram'?'TG':'Slack'),
                  h('span',{className:'badge badge-blue',style:{marginLeft:4}},c.type),
                  c.members>0 && h('span',{style:{marginLeft:6}},c.members+' members')
                )
              ),
              h('div',{className:'chat-check'},
                selected.includes(c.id) && h('span',{style:{color:'var(--bg)',fontSize:12}},'\u2713'))
            )
          )
        ),
        selected.length>0 && h('div',{style:{marginTop:14}},
          h('div',{className:'sep'}),
          h('label',null,'Save selection as list'),
          h('div',{className:'row-gap'},
            h('input',{type:'text',placeholder:'List name',value:saveListName,onChange:e=>setSaveListName(e.target.value),style:{flex:1}}),
            h('button',{className:'btn btn-secondary btn-sm',onClick:doSaveList,disabled:!saveListName},'Save')),
          msg && h('div',{className:'alert alert-ok',style:{marginTop:8}},msg)
        )
      )
    ),
    h('div',{className:'sidebar'},
      h('div',{className:'sidebar-title'},'Saved Lists'),
      lists.length===0 && h('p',{style:{color:'var(--muted)',fontSize:12}},'No saved lists yet'),
      lists.map(lst=>
        h('div',{key:lst.id,style:{marginBottom:10,padding:10,background:'var(--bg)',borderRadius:'var(--radius)',border:'1px solid var(--border)'}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
            h('span',{style:{fontSize:13}},lst.name),
            h('button',{className:'btn btn-secondary btn-sm',style:{padding:'3px 8px',fontSize:10},onClick:()=>deleteList(lst.id)},'\u2715')),
          h('div',{style:{fontSize:11,color:'var(--muted)',marginTop:4}},
            lst.chats.length+' chats',
            lst.channel_type && h('span',{className:'badge badge-'+(lst.channel_type==='mixed'?'mixed':lst.channel_type==='telegram'?'tg':'slack'),style:{marginLeft:6}},lst.channel_type)),
          h('button',{className:'btn btn-secondary btn-sm',style:{marginTop:8,width:'100%'},onClick:()=>loadSavedList(lst)},'Load')
        )
      )
    )
  );
}

// ── Unified Broadcast Page ──────────────────────────────────────────────────
function UnifiedBroadcastPage({selected}) {
  const [message, setMessage] = useState('');
  const [delay, setDelay] = useState(3);
  const [randomDelay, setRandomDelay] = useState(false);
  const [maxPerMin, setMaxPerMin] = useState(15);
  const [broadcastId, setBroadcastId] = useState(null);
  const [status, setStatus] = useState(null);
  const [polling, setPolling] = useState(false);
  const [templates, setTemplates] = useState([]);
  const [tplName, setTplName] = useState('');
  const [tplMsg, setTplMsg] = useState('');
  const [tplTab, setTplTab] = useState(false);
  const logRef = useRef(null);
  const pollRef = useRef(null);

  useEffect(() => { loadTemplates(); }, []);
  useEffect(() => { if(logRef.current) logRef.current.scrollTop=logRef.current.scrollHeight; }, [status]);

  const loadTemplates = async () => {
    try { const r = await api.get('/api/templates'); setTemplates(r.templates||[]); } catch(e) {}
  };

  const startPoll = (bid) => {
    setPolling(true);
    pollRef.current = setInterval(async () => {
      try {
        const s = await api.get('/api/unified/broadcast/status?broadcast_id='+bid);
        setStatus(s);
        if(!s.running&&s.finished) { clearInterval(pollRef.current); setPolling(false); }
      } catch(e){}
    }, 800);
  };

  const doStart = async () => {
    if(!selected.length||!message.trim()) return;
    const r = await api.post('/api/unified/broadcast/start',{
      chat_ids:selected, message, delay, random_delay:randomDelay, max_per_minute:maxPerMin
    });
    setBroadcastId(r.broadcast_id);
    startPoll(r.broadcast_id);
  };

  const doStop = async () => {
    if(broadcastId) await api.post('/api/unified/broadcast/stop?broadcast_id='+broadcastId,{});
  };

  const doSaveTpl = async () => {
    if(!tplName||!tplMsg) return;
    await api.post('/api/templates',{name:tplName,text:tplMsg});
    setTplName(''); setTplMsg(''); loadTemplates();
  };

  const progress = status?Math.round((status.sent+status.failed)/(status.total||1)*100):0;
  const tgCount = selected.filter(id=>id.startsWith('tg:')).length;
  const slackCount = selected.filter(id=>id.startsWith('slack:')).length;

  return h('div',{className:'main'},
    h('div',{className:'page'},
      selected.length===0 && h('div',{className:'alert alert-info',style:{marginBottom:16}},'Select chats in the Chats tab first'),

      h('div',{className:'card'},
        h('div',{className:'card-title'},'Compose Message'),
        h('div',{style:{display:'flex',gap:8,marginBottom:10}},
          h('button',{className:'btn btn-secondary btn-sm',onClick:()=>setTplTab(false),style:!tplTab?{borderColor:'var(--accent)',color:'var(--accent)'}:{}},'Compose'),
          h('button',{className:'btn btn-secondary btn-sm',onClick:()=>setTplTab(true),style:tplTab?{borderColor:'var(--accent)',color:'var(--accent)'}:{}},'Templates')
        ),
        !tplTab ? h(F,null,
          h('textarea',{placeholder:'Type your broadcast message...',value:message,onChange:e=>setMessage(e.target.value),style:{minHeight:130}}),
          h('div',{style:{fontSize:11,color:'var(--muted)',marginTop:4,textAlign:'right'}},
            message.length+' chars \u00b7 '+selected.length+' chats',
            tgCount>0&&' ('+tgCount+' TG',
            slackCount>0&&(tgCount>0?' + ':' (')+slackCount+' Slack',
            (tgCount>0||slackCount>0)&&')')
        ) : h('div',null,
          h('div',{style:{marginBottom:10}},
            templates.length===0 && h('p',{style:{color:'var(--muted)',fontSize:12}},'No templates yet'),
            templates.map(t=>
              h('div',{key:t.id,style:{display:'flex',alignItems:'center',gap:8,marginBottom:8,padding:'8px 10px',background:'var(--bg)',borderRadius:'var(--radius)',border:'1px solid var(--border)'}},
                h('div',{style:{flex:1}},
                  h('div',{style:{fontSize:12}},t.name),
                  h('div',{style:{fontSize:11,color:'var(--muted)',marginTop:2,maxWidth:300,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},t.text)),
                h('button',{className:'btn btn-secondary btn-sm',onClick:()=>{setMessage(t.text);setTplTab(false);}},'Use'),
                h('button',{className:'btn btn-sm',style:{background:'transparent',color:'var(--muted)',border:'none'},onClick:()=>api.del('/api/templates/'+t.id).then(loadTemplates)},'\u2715')))),
          h('div',{className:'sep'}),
          h('label',null,'Template Name'), h('input',{type:'text',value:tplName,onChange:e=>setTplName(e.target.value)}),
          h('label',null,'Message'), h('textarea',{value:tplMsg,onChange:e=>setTplMsg(e.target.value),style:{minHeight:80}}),
          h('div',{style:{marginTop:10}}, h('button',{className:'btn btn-secondary btn-sm',onClick:doSaveTpl,disabled:!tplName||!tplMsg},'Save Template'))
        )
      ),

      h('div',{className:'card'},
        h('div',{className:'card-title'},'Settings'),
        h('div',{className:'two-col'},
          h('div',null, h('label',null,'Delay (s)'), h('input',{type:'number',min:1,max:60,value:delay,onChange:e=>setDelay(Number(e.target.value))})),
          h('div',null, h('label',null,'Max per minute'), h('input',{type:'number',min:1,max:60,value:maxPerMin,onChange:e=>setMaxPerMin(Number(e.target.value))}))
        ),
        h('div',{className:'toggle-row'},
          h('span',{className:'toggle-label'},'Random delay (+0\u20133s)'),
          h('label',{className:'toggle'},
            h('input',{type:'checkbox',checked:randomDelay,onChange:e=>setRandomDelay(e.target.checked)}),
            h('span',{className:'toggle-slider'})))
      ),

      h('div',{style:{display:'flex',gap:10}},
        h('button',{className:'btn btn-primary',style:{flex:1,justifyContent:'center'},onClick:doStart,disabled:polling||!selected.length||!message.trim()},
          polling?h(F,null,h('span',{className:'spinner'}),' Broadcasting...'):'Start Broadcast ('+selected.length+' chats)'),
        polling && h('button',{className:'btn btn-danger',onClick:doStop},'Stop')
      ),

      status && h('div',{className:'card',style:{marginTop:16}},
        h('div',{className:'card-title'},'Progress'),
        status.current_chat && h('div',{style:{marginBottom:10,display:'flex',alignItems:'center',gap:8}},
          h('span',{className:'spinner'}), h('span',{className:'current-tag'},'Sending to: '+status.current_chat)),
        h('div',{className:'progress-bar'}, h('div',{className:'progress-fill',style:{width:progress+'%'}})),
        h('div',{style:{textAlign:'right',fontSize:11,color:'var(--muted)',marginBottom:12}},progress+'% ('+(status.sent+status.failed)+'/'+status.total+')'),
        h('div',{className:'stats-row'},
          h('div',{className:'stat'},h('div',{className:'stat-val val-blue'},status.total),h('div',{className:'stat-key'},'Total')),
          h('div',{className:'stat'},h('div',{className:'stat-val val-green'},status.sent),h('div',{className:'stat-key'},'Sent')),
          h('div',{className:'stat'},h('div',{className:'stat-val val-red'},status.failed),h('div',{className:'stat-key'},'Failed'))
        ),
        h('div',{className:'log-box',ref:logRef},
          (status.log||[]).map((l,i)=>h('div',{key:i,className:'log-line'},l)),
          !status.running&&status.finished&&h('div',{className:'log-line',style:{color:'var(--green)',marginTop:8}},'\u2501\u2501 BROADCAST COMPLETE \u2501\u2501'))
      )
    )
  );
}

// ── Accounts Page ──────────────────────────────────────────────────────────
function AccountsPage() {
  const [accounts, setAccounts] = useState([]);
  const [total, setTotal] = useState(0);
  const [page, setPage] = useState(1);
  const perPage = 50;
  const [search, setSearch] = useState('');
  const [filterMessenger, setFilterMessenger] = useState('');
  const [filterType, setFilterType] = useState('');
  const [filterOwner, setFilterOwner] = useState('');
  const [filterTag, setFilterTag] = useState('');
  const [tags, setTags] = useState([]);
  const [users, setUsers] = useState([]);
  const [selected, setSelected] = useState([]);
  const [loading, setLoading] = useState(false);
  const [newTag, setNewTag] = useState('');
  const [modal, setModal] = useState(null); // 'owner' | 'tags' | null
  const [modalOwner, setModalOwner] = useState('');
  const [modalTags, setModalTags] = useState([]);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      let q = '/api/accounts?page='+page+'&per_page='+perPage;
      if (search) q += '&search='+encodeURIComponent(search);
      if (filterMessenger) q += '&messenger='+filterMessenger;
      if (filterType) q += '&type='+filterType;
      if (filterOwner) q += '&owner_id='+filterOwner;
      if (filterTag) q += '&tags='+filterTag;
      const r = await api.get(q);
      setAccounts(r.accounts||[]);
      setTotal(r.total||0);
    } catch(e) {}
    setLoading(false);
  }, [page, search, filterMessenger, filterType, filterOwner, filterTag]);

  const loadTags = () => api.get('/api/accounts/tags').then(r => setTags(r.tags||[])).catch(()=>{});
  const loadUsers = () => api.get('/api/auth/users').then(r => setUsers(r.users||r||[])).catch(()=>{});

  useEffect(() => { load(); }, [load]);
  useEffect(() => { loadTags(); loadUsers(); }, []);

  const toggleSelect = (id) => setSelected(p => p.includes(id) ? p.filter(x=>x!==id) : [...p,id]);
  const selectAll = () => setSelected(accounts.map(a=>a.id));
  const clearAll = () => setSelected([]);

  const addTag = async () => {
    if (!newTag.trim()) return;
    await api.post('/api/accounts/tags', {name: newTag.trim()});
    setNewTag('');
    loadTags();
  };

  const deleteTag = async (id) => {
    await api.del('/api/accounts/tags/'+id);
    loadTags();
    load();
  };

  const doBulkOwner = async () => {
    if (!selected.length) return;
    await api.put('/api/accounts/bulk/owner', {account_ids: selected, owner_id: modalOwner ? parseInt(modalOwner) : null});
    setModal(null);
    setSelected([]);
    load();
  };

  const doBulkTags = async () => {
    if (!selected.length || !modalTags.length) return;
    await api.post('/api/accounts/bulk/tags', {account_ids: selected, tag_ids: modalTags.map(Number)});
    setModal(null);
    setModalTags([]);
    setSelected([]);
    load();
  };

  const doBulkRemoveTags = async () => {
    if (!selected.length || !modalTags.length) return;
    await api.del_body('/api/accounts/bulk/tags', {account_ids: selected, tag_ids: modalTags.map(Number)});
    setModal(null);
    setModalTags([]);
    setSelected([]);
    load();
  };

  const totalPages = Math.ceil(total / perPage);
  const messengerBadge = (m) => m==='telegram' ? h('span',{className:'badge badge-tg'},'TG') : h('span',{className:'badge badge-slack'},'Slack');
  const typeBadge = (t) => {
    if(t==='channel') return h('span',{className:'badge badge-blue'},'Channel');
    if(t==='group') return h('span',{className:'badge badge-green'},'Group');
    return h('span',{className:'badge badge-mixed'},'DM');
  };

  return h('div',{className:'page'},
    // Filters
    h('div',{className:'card'},
      h('div',{className:'card-title'},'Accounts'),
      h('div',{className:'search-row'},
        h('input',{type:'text',placeholder:'Search by name...',value:search,
          onChange:e=>{setSearch(e.target.value);setPage(1);}})
      ),
      h('div',{className:'filter-row'},
        h('span',{style:{fontSize:11,color:'var(--muted)',marginRight:4}},'Messenger:'),
        ['','telegram','slack'].map(v=>
          h('button',{key:'m'+v,className:'filter-btn'+(filterMessenger===v?' active':''),
            onClick:()=>{setFilterMessenger(v);setPage(1);}}, v||'All')
        )
      ),
      h('div',{className:'filter-row'},
        h('span',{style:{fontSize:11,color:'var(--muted)',marginRight:4}},'Type:'),
        ['','channel','group','dm'].map(v=>
          h('button',{key:'t'+v,className:'filter-btn'+(filterType===v?' active':''),
            onClick:()=>{setFilterType(v);setPage(1);}}, v||'All')
        )
      ),
      h('div',{className:'filter-row'},
        h('span',{style:{fontSize:11,color:'var(--muted)',marginRight:4}},'Owner:'),
        h('button',{className:'filter-btn'+(filterOwner===''?' active':''),onClick:()=>{setFilterOwner('');setPage(1);}},'All'),
        h('button',{className:'filter-btn'+(filterOwner==='unassigned'?' active':''),onClick:()=>{setFilterOwner('unassigned');setPage(1);}},'Unassigned'),
        users.map(u=>h('button',{key:'o'+u.id,className:'filter-btn'+(filterOwner===String(u.id)?' active':''),
          onClick:()=>{setFilterOwner(String(u.id));setPage(1);}},u.username))

        h('span',{style:{fontSize:11,color:'var(--muted)',marginRight:4}},'Tag:'),
        h('button',{className:'filter-btn'+(filterTag===''?' active':''),onClick:()=>{setFilterTag('');setPage(1);}},'All'),
        tags.map(t=>h('button',{key:'tag'+t.id,className:'filter-btn'+(filterTag===String(t.id)?' active':''),
          onClick:()=>{setFilterTag(String(t.id));setPage(1);}},t.name))
      )
    ),

    // Tag management
    h('div',{className:'card'},
      h('div',{className:'card-title'},'Tags'),
      h('div',{style:{display:'flex',gap:8,alignItems:'flex-end',marginBottom:12}},
        h('input',{type:'text',placeholder:'New tag name',value:newTag,onChange:e=>setNewTag(e.target.value),
          style:{width:200},onKeyDown:e=>{if(e.key==='Enter')addTag();}}),
        h('button',{className:'btn btn-primary btn-sm',onClick:addTag,disabled:!newTag.trim()},'Add')
      ),
      h('div',{style:{display:'flex',gap:6,flexWrap:'wrap'}},
        tags.map(t=>h('span',{key:t.id,className:'tag-chip'},
          t.name,
          h('span',{className:'tag-chip-rm',onClick:()=>deleteTag(t.id)},'\u00d7')
        ))
      )
    ),

    // Bulk actions bar
    selected.length>0 && h('div',{className:'bulk-bar'},
      h('span',{style:{fontSize:12}},selected.length+' selected'),
      h('button',{className:'btn btn-primary btn-sm',onClick:()=>{setModalOwner('');setModal('owner');}},'Assign Owner'),
      h('button',{className:'btn btn-secondary btn-sm',onClick:()=>{setModalTags([]);setModal('tags');}},'Add Tags'),
      h('button',{className:'btn btn-danger btn-sm',onClick:()=>{setModalTags([]);setModal('removetags');}},'Remove Tags'),
      h('button',{className:'btn btn-secondary btn-sm',onClick:clearAll},'Clear')
    ),

    // Table
    h('div',{className:'card'},
      loading ? h('div',{style:{textAlign:'center',padding:20}},h('span',{className:'spinner'})) :
      h('div',{style:{overflowX:'auto'}},
        h('table',null,
          h('thead',null,h('tr',null,
            h('th',{style:{width:30}},h('input',{type:'checkbox',className:'acc-checkbox',
              checked:selected.length===accounts.length&&accounts.length>0,
              onChange:e=>e.target.checked?selectAll():clearAll()})),
            h('th',null,'Name'),
            h('th',null,'Messenger'),
            h('th',null,'External Channel'),
            h('th',null,'Type'),
            h('th',null,'Tags'),
            h('th',null,'Owner'),
            h('th',null,'Created At')
          )),
          h('tbody',null,
            accounts.length===0 ? h('tr',null,h('td',{colSpan:8,style:{color:'var(--muted)',textAlign:'center'}},'No accounts found')) :
            accounts.map(a=>h('tr',{key:a.id},
              h('td',null,h('input',{type:'checkbox',className:'acc-checkbox',checked:selected.includes(a.id),onChange:()=>toggleSelect(a.id)})),
              h('td',null,a.name),
              h('td',null,messengerBadge(a.messenger)),
              h('td',{style:{fontSize:11,color:'var(--muted)'}},a.external_channel),
              h('td',null,typeBadge(a.type)),
              h('td',null,h('div',{style:{display:'flex',gap:4,flexWrap:'wrap'}},
                (a.tags||[]).map(t=>h('span',{key:t.id,className:'tag-chip'},t.name)))),
              h('td',null,a.owner_name ? h('span',{className:'badge badge-blue'},a.owner_name) : h('span',{style:{color:'var(--muted)',fontSize:11}},'—')),
              h('td',{style:{color:'var(--muted)',fontSize:11}},a.created_at?.slice(0,16).replace('T',' '))
            ))
          )
        )
      ),
      // Pagination
      totalPages>1 && h('div',{style:{display:'flex',justifyContent:'center',gap:8,marginTop:12}},
        h('button',{className:'btn btn-secondary btn-sm',disabled:page<=1,onClick:()=>setPage(page-1)},'Prev'),
        h('span',{style:{fontSize:12,color:'var(--muted)',lineHeight:'30px'}},
          'Page '+page+' of '+totalPages+' ('+total+' total)'),
        h('button',{className:'btn btn-secondary btn-sm',disabled:page>=totalPages,onClick:()=>setPage(page+1)},'Next')
      )
    ),

    // Modals
    modal==='owner' && h('div',{className:'modal-overlay',onClick:()=>setModal(null)},
      h('div',{className:'modal-box',onClick:e=>e.stopPropagation()},
        h('div',{className:'card-title'},'Assign Owner'),
        h('select',{value:modalOwner,onChange:e=>setModalOwner(e.target.value),
          style:{width:'100%',padding:'8px 12px',background:'var(--bg)',border:'1px solid var(--border)',
            borderRadius:'var(--radius)',color:'var(--text)',fontFamily:'inherit',fontSize:13,marginBottom:16}},
          h('option',{value:''},'— Unassign —'),
          users.map(u=>h('option',{key:u.id,value:String(u.id)},u.username))
        ),
        h('div',{style:{display:'flex',gap:8,justifyContent:'flex-end'}},
          h('button',{className:'btn btn-secondary btn-sm',onClick:()=>setModal(null)},'Cancel'),
          h('button',{className:'btn btn-primary btn-sm',onClick:doBulkOwner},'Apply')
        )
      )
    ),

    (modal==='tags'||modal==='removetags') && h('div',{className:'modal-overlay',onClick:()=>setModal(null)},
      h('div',{className:'modal-box',onClick:e=>e.stopPropagation()},
        h('div',{className:'card-title'},modal==='tags'?'Add Tags':'Remove Tags'),
        h('div',{style:{display:'flex',flexDirection:'column',gap:8,marginBottom:16}},
          tags.map(t=>h('label',{key:t.id,style:{display:'flex',alignItems:'center',gap:8,cursor:'pointer',margin:0}},
            h('input',{type:'checkbox',checked:modalTags.includes(String(t.id)),
              onChange:e=>setModalTags(p=>e.target.checked?[...p,String(t.id)]:p.filter(x=>x!==String(t.id)))}),
            h('span',{style:{fontSize:12}},t.name)
          ))
        ),
        tags.length===0 && h('p',{style:{color:'var(--muted)',fontSize:12,marginBottom:16}},'No tags created yet.'),
        h('div',{style:{display:'flex',gap:8,justifyContent:'flex-end'}},
          h('button',{className:'btn btn-secondary btn-sm',onClick:()=>setModal(null)},'Cancel'),
          h('button',{className:'btn '+(modal==='removetags'?'btn-danger':'btn-primary')+' btn-sm',
            onClick:modal==='tags'?doBulkTags:doBulkRemoveTags,disabled:!modalTags.length},
            modal==='tags'?'Add':'Remove')
        )
      )
    )
  );
}

// ── Dashboard Page ─────────────────────────────────────────────────────────
function DashboardPage() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    api.get('/api/dashboard').then(r => setData(r)).catch(()=>{}).finally(()=>setLoading(false));
  }, []);

  if (loading) return h('div',{className:'page',style:{display:'flex',alignItems:'center',justifyContent:'center'}},
    h('span',{className:'spinner'}));
  if (!data) return h('div',{className:'page'},h('div',{className:'card'},h('p',{style:{color:'var(--muted)'}},'Failed to load dashboard')));

  const maxCount = Math.max(1, ...data.chats_by_manager.map(m=>m.chats_count));

  return h('div',{className:'page'},
    h('div',{className:'card'},
      h('div',{className:'card-title'},'Dashboard'),
      h('div',{className:'dash-grid'},
        [{label:'Total Chats',val:data.total_chats,color:'var(--accent)'},
         {label:'Telegram',val:data.telegram_chats,color:'var(--tg)'},
         {label:'Slack',val:data.slack_chats,color:'var(--slack)'},
         {label:'Channels',val:data.channels,color:'var(--accent)'},
         {label:'Groups',val:data.groups,color:'var(--green)'},
         {label:'DM',val:data.dm,color:'var(--yellow)'}
        ].map(c=>h('div',{key:c.label,className:'dash-card'},
          h('div',{className:'dash-card-val',style:{color:c.color}},c.val),
          h('div',{className:'dash-card-label'},c.label)
        ))
      )
    ),

    h('div',{className:'card'},
      h('div',{className:'card-title'},'Chats by Manager'),
      data.chats_by_manager.length===0
        ? h('p',{style:{color:'var(--muted)',fontSize:12}},'No data')
        : data.chats_by_manager.map(m=>
            h('div',{key:m.manager_name,className:'bar-row'},
              h('div',{className:'bar-name'},m.manager_name),
              h('div',{className:'bar-fill-bg'},
                h('div',{className:'bar-fill',style:{width:Math.round(m.chats_count/maxCount*100)+'%',
                  background:m.manager_name==='Unassigned'?'var(--muted)':'var(--accent)'}})
              ),
              h('div',{className:'bar-count'},m.chats_count)
            )
          )
    )
  );
}

// ── App ─────────────────────────────────────────────────────────────────────
function App() {
  const [appUser, setAppUser] = useState(null);
  const [tab, setTab] = useState('broadcast');
  const [selected, setSelected] = useState([]);
  const [integrations, setIntegrations] = useState(null);
  const [showSetup, setShowSetup] = useState(!sessionStorage.getItem('api_base'));
  const [checking, setChecking] = useState(true);

  const loadIntegrations = useCallback(async () => {
    try { const r = await api.get('/api/integrations/status'); setIntegrations(r);
      if(r.telegram?.session_token) setTgSession(r.telegram.session_token);
      if(r.slack?.session_token) setSlackSession(r.slack.session_token);
    } catch(e){}
  }, []);

  // Handle Slack OAuth callback
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const slackToken = params.get('slack_connected');
    if(slackToken) { setSlackSession(slackToken); window.history.replaceState({},'','/'); }
  }, []);

  // Auto-login with stored JWT
  useEffect(() => {
    if(showSetup) { setChecking(false); return; }
    if(!JWT_TOKEN) { setChecking(false); return; }
    api.get('/api/auth/me').then(u => {
      const user = {username:u.username, role:u.role, id:u.id, company_id:u.company_id||null, company_name:u.company_name||null};
      setAppUser(user);
      if (u.role !== 'superadmin') loadIntegrations();
    }).catch(() => { setJwt(''); }).finally(() => setChecking(false));
  }, [showSetup]);

  const handleSetup = () => { setShowSetup(false); setChecking(false); };
  const handleLogin = (u) => { setAppUser(u); if(u.role !== 'superadmin') loadIntegrations(); };
  const handleLogout = () => { setJwt(''); setTgSession(''); setSlackSession(''); setAppUser(null); setSelected([]); setIntegrations(null); };

  if(showSetup) return h(SettingsScreen,{onSave:handleSetup});
  if(checking) return h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',gap:12}},
    h('span',{className:'spinner'}), h('span',{style:{color:'var(--muted)'}},'Loading...'));
  if(!appUser) return h(F,null,
    h('div',{style:{position:'fixed',top:16,right:16,zIndex:200}},
      h('button',{className:'btn btn-secondary btn-sm',onClick:()=>setShowSetup(true)},'Settings')),
    h(AppLoginPage,{onAuth:handleLogin}));

  const tgOk = integrations?.telegram?.connected;
  const slackOk = integrations?.slack?.connected;
  const isSuperAdmin = appUser.role === 'superadmin';
  const isCompanyAdmin = appUser.role === 'company_admin';

  const navTabs = isSuperAdmin
    ? [['companies','Companies'],['sa_users','All Users'],['system','System']]
    : isCompanyAdmin
    ? [['broadcast','Broadcast'+(selected.length?' ('+selected.length+')':'')],['chats','Chats'],['accounts','Accounts'],['dashboard','Dashboard'],['history','History'],['settings','Settings']]
    : [['broadcast','Broadcast'+(selected.length?' ('+selected.length+')':'')],['chats','Chats'],['accounts','Accounts'],['dashboard','Dashboard'],['history','History'],['settings','Settings']];

  // Reset tab if current tab is invalid for role
  useEffect(() => {
    const validKeys = navTabs.map(t=>t[0]);
    if (!validKeys.includes(tab)) setTab(validKeys[0]);
  }, [appUser.role]);

  const roleBadge = isSuperAdmin ? h('span',{className:'badge badge-red',style:{marginRight:6}},'Super Admin')
    : isCompanyAdmin ? h('span',{className:'badge badge-blue',style:{marginRight:6}},'Admin')
    : h('span',{className:'badge badge-green',style:{marginRight:6}},'User');

  const logoSub = isSuperAdmin ? 'SUPER ADMIN'
    : (tgOk?'TG ':'')+(tgOk&&slackOk?' + ':'')+(slackOk?'Slack ':'')+(!tgOk&&!slackOk?'No integrations':'');

  return h(F,null,
    h('div',{className:'header'},
      h('div',{className:'header-logo'},
        h('div',{className:'logo-icon'},'B'),
        h('div',null,
          h('div',{className:'logo-text'},'Broadcast Service'),
          h('div',{className:'logo-sub'}, logoSub)
        )
      ),
      h('div',{className:'header-user'},
        !isSuperAdmin && tgOk && h('span',{className:'badge badge-tg',style:{marginRight:4}},'TG'),
        !isSuperAdmin && slackOk && h('span',{className:'badge badge-slack',style:{marginRight:4}},'Slack'),
        roleBadge,
        h('div',{className:'status-dot'}),
        h('span',null,appUser.username),
        appUser.company_name && h('span',{style:{color:'var(--muted)',fontSize:11,marginLeft:4}},'('+appUser.company_name+')'),
        h('button',{className:'btn btn-secondary btn-sm',onClick:()=>setShowSetup(true),style:{marginLeft:8}},'Backend'),
        h('button',{className:'btn btn-secondary btn-sm',onClick:handleLogout},'Logout')
      )
    ),
    h('div',{className:'nav'},
      navTabs.map(([k,l])=>
        h('button',{key:k,className:'nav-btn'+(tab===k?' active':''),onClick:()=>setTab(k)},l)
      )
    ),
    h('div',{style:{flex:1,overflow:'auto'}},
      tab==='broadcast' && h(UnifiedBroadcastPage,{selected}),
      tab==='chats' && h(UnifiedChatsPage,{selected,setSelected}),
      tab==='accounts' && h(AccountsPage,null),
      tab==='dashboard' && h(DashboardPage,null),
      tab==='history' && h(HistoryPage,null),
      tab==='settings' && h(SettingsPage,{integrations,onRefresh:loadIntegrations,appUser}),
      tab==='companies' && h(SACompaniesPage,null),
      tab==='sa_users' && h(SAUsersPage,null),
      tab==='system' && h(SASystemPage,null)
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
