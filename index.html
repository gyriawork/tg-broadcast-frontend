<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>TG Broadcast</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c10;--surface:#0e1520;--surface2:#152030;--border:#1e3040;--accent:#00d4ff;--accent2:#0090cc;--green:#00ff88;--red:#ff4466;--text:#c8dde8;--muted:#4a6070;--radius:6px}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px}
#root{min-height:100vh;display:flex;flex-direction:column}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100}

.nav-btn:hover{color:var(--text);background:var(--surface)}.nav-btn.active{color:var(--accent);background:var(--surface);border-bottom:2px solid var(--accent)}
.main{flex:1;display:flex;overflow:hidden}.page{flex:1;padding:28px;overflow-y:auto}
.card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:20px;margin-bottom:16px}
.card-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--accent);margin-bottom:16px;text-transform:uppercase}
label{display:block;font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;margin-top:14px}

input:focus,textarea:focus{border-color:var(--accent)}textarea{resize:vertical;min-height:100px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:6px;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:500;transition:all .2s}
.btn-primary{background:var(--accent);color:var(--bg)}.btn-primary:hover{background:#00b8e0}

.toggle-slider:before{position:absolute;content:'';height:16px;width:16px;left:3px;bottom:3px;background:var(--muted);border-radius:50%;transition:.3s}
input:checked+.toggle-slider{background:var(--accent2)}input:checked+.toggle-slider:before{transform:translateX(18px);background:var(--accent)}
.chat-list{max-height:420px;overflow-y:auto}

.stat{flex:1;text-align:center;padding:10px;background:var(--bg);border-radius:6px;border:1px solid var(--border)}
.stat-val{font-size:24px;font-family:'Syne',sans-serif;font-weight:800}
.val-green{color:var(--green)}.val-red{color:var(--red)}.val-blue{color:var(--accent)}

.login-hero h1{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;color:var(--accent)}
.login-hero p{color:var(--muted);margin-top:8px;font-size:12px}
.alert{padding:10px 14px;border-radius:6px;font-size:12px;margin-top:12px}

.alert-info{background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);color:var(--accent)}
.sidebar{width:280px;background:var(--surface);border-left:1px solid var(--border);padding:20px;overflow-y:auto}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px}
.badge-blue{background:rgba(0,212,255,.15);color:var(--accent)}.badge-green{background:rgba(0,255,136,.12);color:var(--green)}.badge-red{background:rgba(255,68,102,.12);color:var(--red)}
table{width:100%;border-collapse:collapse}th{font-size:10px;color:var(--muted);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);text-transform:uppercase}
td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:12px}tr:hover td{background:var(--surface2)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}.row-gap{display:flex;gap:10px;align-items:flex-end;margin-top:14px}
.sep{height:1px;background:var(--border);margin:16px 0}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
.header-logo{display:flex;align-items:center;gap:10px}.logo-sub{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.header-user{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
.selected-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.current-tag{font-size:11px;color:var(--accent);padding:3px 8px;border:1px solid var(--accent2);border-radius:4px}
</style></head><body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<script>

function LoginPage({onAuth}){

      err&&E('div',{className:'alert alert-err'},err),

    step==='phone'&&E('div',{className:'card'},
      E('div',{className:'card-title'},'📱 Телефон'),
      E('label',null,'Номер'),E('input',{type:'tel',value:phone,onChange:e=>setPhone(e.target.value),placeholder:'+79001234567'}),
      err&&E('div',{className:'alert alert-err'},err),

      E('label',null,'Пароль 2FA'),E('input',{type:'password',value:password,onChange:e=>setPassword(e.target.value),placeholder:'••••••••'}),
      err&&E('div',{className:'alert alert-err'},err),

}
function ChatsPage({selected,setSelected}){

            E('button',{className:'btn btn-secondary btn-sm',onClick:async()=>{await api.post('/api/lists',{name:saveListName,chat_ids:selected});setSaveListName('');setMsg('Сохранено!');loadLists();setTimeout(()=>setMsg(''),2000);},disabled:!saveListName},'Сохранить')),

}

          E('div',{className:'stat'},E('div',{className:'stat-val val-green'},status.sent),E('div',{style:{fontSize:10,color:'var(--muted)',textTransform:'uppercase'}},'Отправлено')),
          E('div',{className:'stat'},E('div',{className:'stat-val val-red'},status.failed),E('div',{style:{fontSize:10,color:'var(--muted)',textTransform:'uppercase'}},'Ошибок'))),
        E('div',{className:'log-box',ref:logRef},(status.log||[]).map((l,i)=>E('div',{key:i,style:{padding:'1px 0'}},l)),
          !status.running&&status.finished&&E('div',{style:{color:'var(--green)',marginTop:8}},'━━ РАССЫЛКА ЗАВЕРШЕНА ━━')))));
}
function HistoryPage(){
  const[history,setHistory]=useState([]);
  useEffect(()=>{api.get('/api/history').then(r=>setHistory(r.history||[])).catch(()=>{});},[]);
  return E('div',{className:'page'},
    E('div',{className:'card'},
      E('div',{className:'card-title'},'📜 История рассылок'),
      history.length===0?E('p',{style:{color:'var(--muted)',fontSize:12}},'Нет рассылок')
      :E('table',null,
        E('thead',null,E('tr',null,E('th',null,'Сообщение'),E('th',null,'Отпр.'),E('th',null,'Ошиб.'),E('th',null,'Всего'),E('th',null,'Дата'))),
        E('tbody',null,history.map(h=>E('tr',{key:h.id},
          E('td',{style:{maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},h.message),
          E('td',null,E('span',{className:'badge badge-green'},h.sent)),
          E('td',null,E('span',{className:'badge '+(h.failed>0?'badge-red':'badge-green')},h.failed)),
          E('td',null,h.total),
          E('td',{style:{color:'var(--muted)',fontSize:11}},h.started_at?.slice(0,16).replace('T',' '))))))));
}
function App(){
  const[user,setUser]=useState(null);
  const[tab,setTab]=useState('chats');
  const[selected,setSelected]=useState([]);
  const[checking,setChecking]=useState(false);
  const[showSettings,setShowSettings]=useState(!sessionStorage.getItem('api_base'));
  const tryLogin=useCallback(()=>{
    setChecking(true);
    fetch(API_BASE+'/api/me').then(r=>r.ok?r.json():null).then(me=>{if(me?.name)setUser(me);}).catch(()=>{}).finally(()=>setChecking(false));
  },[]);
  useEffect(()=>{if(!showSettings)tryLogin();},[showSettings]);
  const doLogout=async()=>{await api.post('/api/logout',{}).catch(()=>{});setUser(null);setSelected([]);};
  if(showSettings)return E(SettingsScreen,{onSave:()=>{setShowSettings(false);tryLogin();}});
  if(checking)return E('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',gap:12}},E('span',{className:'spinner'}),E('span',{style:{color:'var(--muted)'}},'Подключение...'));
  if(!user)return E(LoginPage,{onAuth:setUser});
  return E(React.Fragment,null,
    E('div',{className:'header'},
      E('div',{className:'header-logo'},
        E('div',{style:{width:32,height:32,background:'var(--accent)',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}},'📡'),
        E('div',null,E('div',{className:'logo-text'},'TG Broadcast'),E('div',{className:'logo-sub'},'Telethon'))),
      E('div',{className:'header-user'},
        E('div',{className:'status-dot'}),
        E('span',null,user.name||user.username),
        E('button',{className:'btn btn-secondary btn-sm',onClick:()=>setShowSettings(true),style:{marginLeft:8}},'⚙️'),
        E('button',{className:'btn btn-secondary btn-sm',onClick:doLogout},'Выйти'))),
    E('div',{className:'nav'},[['chats','📂 Чаты'],['broadcast','🚀 Рассылка'+(selected.length?' ('+selected.length+')':'')],['history','📜 История']].map(([k,l])=>E('button',{key:k,className:'nav-btn'+(tab===k?' active':''),onClick:()=>setTab(k)},l))),
    E('div',{style:{flex:1,overflow:'auto'}},
      tab==='chats'&&E(ChatsPage,{selected,setSelected}),
      tab==='broadcast'&&E(BroadcastPage,{selected}),
      tab==='history'&&E(HistoryPage,null)));
}
ReactDOM.createRoot(document.getElementById('root')).render(E(App,null));
</script></body></html>
